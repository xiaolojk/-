<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卡牌游戏 - 云服务器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #fff; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #1e293b; padding: 48px; border-radius: 16px; text-align: center; max-width: 480px; }
    h1 { color: #6366f1; margin-bottom: 16px; }
    p { color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
    .endpoints { text-align: left; background: #0f172a; padding: 20px; border-radius: 12px; }
    .endpoint { margin-bottom: 8px; font-family: monospace; font-size: 14px; }
    .method { color: #22c55e; }
    .path { color: #8b5cf6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>卡牌对决</h1>
    <p>游戏后端云服务器正在运行中</p>
    <div class="endpoints">
      <div class="endpoint"><span class="method">POST</span> <span class="path">/api/user/register</span> - 注册</div>
      <div class="endpoint"><span class="method">POST</span> <span class="path">/api/user/login</span> - 登录</div>
    </div>
  </div>
</body>
</html>
