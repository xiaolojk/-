<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lost Blue Sea</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;width:100vw;height:100vh;height:100dvh;font-family:monospace;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:absolute;top:0;left:0;z-index:0;touch-action:none;}

#loadingScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a1628,#1a3a5c);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#loadingScreen .logo{font-size:clamp(32px,8vw,48px);font-weight:bold;color:#4fc3f7;text-shadow:0 0 20px #4fc3f7,0 0 40px #4fc3f7;margin-bottom:8px;letter-spacing:2px;}
#loadingScreen .subtitle{font-size:14px;color:#78909c;margin-bottom:30px;}
#loadingScreen .progressBar{width:240px;height:6px;background:#1a3a5c;border-radius:3px;overflow:hidden;}
#loadingScreen .progressFill{height:100%;background:linear-gradient(90deg,#4fc3f7,#81d4fa);width:0%;transition:width 0.3s;}
#loadingScreen .tip{color:#546e7a;font-size:12px;margin-top:15px;text-align:center;padding:0 20px;}

#controls{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 10px;z-index:50;pointer-events:none;}
#controls>*{pointer-events:auto;}
#dpad{display:flex;gap:4px;align-items:flex-end;}
.dpadBtn{width:54px;height:54px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.7);font-size:22px;backdrop-filter:blur(4px);}
.dpadBtn:active{background:rgba(255,255,255,0.35);}
#btnJump{width:62px;height:62px;background:rgba(33,150,243,0.3);border:2px solid rgba(33,150,243,0.5);border-radius:50%;color:#fff;font-size:13px;font-weight:bold;margin-left:8px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#btnJump:active{background:rgba(33,150,243,0.6);}

#actionBtns{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.actionBtn{width:58px;height:58px;border-radius:50%;color:#fff;font-size:13px;font-weight:bold;display:flex;align-items:center;justify-content:center;border:2px solid;backdrop-filter:blur(4px);}
#btnMine{background:rgba(255,152,0,0.35);border-color:rgba(255,152,0,0.6);}
#btnMine:active{background:rgba(255,152,0,0.6);}
#btnInteract{background:rgba(76,175,80,0.35);border-color:rgba(76,175,80,0.6);}
#btnInteract:active{background:rgba(76,175,80,0.6);}

#menuBtns{position:absolute;top:10px;right:10px;z-index:50;display:flex;gap:5px;}
.menuBtn{padding:7px 12px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;font-size:11px;backdrop-filter:blur(4px);}
.menuBtn:active{background:rgba(255,255,255,0.2);}

#hotbar{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:50;background:rgba(0,0,0,0.7);padding:4px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(4px);}
.hotbarSlot{width:40px;height:40px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative;}
.hotbarSlot.selected{border-color:#ffd700;background:rgba(255,215,0,0.15);box-shadow:0 0 8px rgba(255,215,0,0.4);}
.hotbarSlot .icon{font-size:18px;line-height:1;}
.hotbarSlot .count{position:absolute;bottom:1px;right:2px;font-size:8px;color:#fff;font-weight:bold;text-shadow:1px 1px 0 #000;}

.panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.93);border:2px solid #4fc3f7;border-radius:12px;padding:16px;color:#fff;z-index:80;display:none;max-height:75vh;overflow-y:auto;min-width:280px;max-width:92vw;backdrop-filter:blur(8px);}
.panel h2{color:#4fc3f7;margin-bottom:10px;text-align:center;font-size:17px;}
.panel .closeBtn{position:absolute;top:8px;right:12px;color:#f44;font-size:20px;cursor:pointer;background:none;border:none;}
.panel .item{padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:13px;}
.panel .itemName{color:#81d4fa;}
.panel .craftBtn{background:#2e7d32;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;}
.panel .craftBtn:disabled{background:#444;color:#888;}
.panel .useBtn{background:#1565c0;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;margin-left:4px;}

#toast{position:absolute;top:55px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#4fc3f7;padding:10px 20px;border-radius:8px;font-size:13px;z-index:90;display:none;text-align:center;max-width:90%;pointer-events:none;border:1px solid rgba(79,195,247,0.4);}

#hint{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;z-index:40;text-align:center;text-shadow:0 0 8px #000,1px 1px 0 #000;pointer-events:none;display:none;white-space:nowrap;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="loadingScreen">
  <div class="logo">LOST BLUE SEA</div>
  <div class="subtitle">迷茫蓝海 · Orgc</div>
  <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
  <div class="tip" id="loadingTip">加载中...</div>
</div>

<div id="controls" style="display:none">
  <div id="dpad">
    <button class="dpadBtn" id="btnLeft">◀</button>
    <button class="dpadBtn" id="btnRight">▶</button>
    <button id="btnJump">跳</button>
  </div>
  <div id="actionBtns">
    <button class="actionBtn" id="btnMine">挖</button>
    <button class="actionBtn" id="btnInteract">交互</button>
  </div>
</div>

<div id="menuBtns" style="display:none">
  <button class="menuBtn" id="btnInventory">背包</button>
  <button class="menuBtn" id="btnCraft">制作</button>
  <button class="menuBtn" id="btnMenu">菜单</button>
</div>

<div id="hotbar" style="display:none"></div>

<div class="panel" id="inventoryPanel">
  <button class="closeBtn" onclick="closePanel('inventoryPanel')">✕</button>
  <h2>背包</h2>
  <div id="inventoryList"></div>
</div>
<div class="panel" id="craftPanel">
  <button class="closeBtn" onclick="closePanel('craftPanel')">✕</button>
  <h2>制作</h2>
  <div id="craftList"></div>
</div>
<div class="panel" id="pausePanel">
  <h2>暂停</h2>
  <button class="menuBtn" onclick="resumeGame()" style="display:block;width:100%;margin:6px 0;padding:10px;font-size:14px;">继续游戏</button>
  <button class="menuBtn" onclick="saveGame()" style="display:block;width:100%;margin:6px 0;padding:10px;font-size:14px;">保存</button>
  <button class="menuBtn" onclick="location.reload()" style="display:block;width:100%;margin:6px 0;padding:10px;font-size:14px;">返回主菜单</button>
</div>
<div class="panel" id="mainMenuPanel" style="display:flex;flex-direction:column;align-items:center;">
  <h2 style="font-size:24px;">LOST BLUE SEA</h2>
  <p style="color:#78909c;margin-bottom:20px;">迷茫蓝海 · Orgc</p>
  <button class="menuBtn" onclick="startGame()" style="display:block;width:200px;margin:6px 0;padding:12px;font-size:15px;">开始游戏</button>
  <button class="menuBtn" onclick="loadGame()" style="display:block;width:200px;margin:6px 0;padding:12px;font-size:15px;">继续游戏</button>
  <p style="color:#546e7a;font-size:10px;margin-top:16px;">v3.1 · Android 10+</p>
</div>
<div id="toast"></div>
<div id="hint"></div>

<script>
// ==================== SPRITE CACHE ====================
// Pre-render detailed pixel art sprites onto offscreen canvases
const SPRITES = {};

function makeSprite(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;
  drawFn(cx, w, h);
  return c;
}

function initSprites() {
  // === Player sprite (32x48) ===
  SPRITES.player = makeSprite(32, 48, (ctx) => {
    // Hair
    ctx.fillStyle='#2d1810'; ctx.fillRect(10,2,12,5);
    ctx.fillRect(8,4,4,3); ctx.fillRect(20,4,4,3);
    // Head
    ctx.fillStyle='#f4c2a1'; ctx.fillRect(10,7,12,10);
    // Hair sides
    ctx.fillStyle='#2d1810'; ctx.fillRect(9,7,2,6); ctx.fillRect(21,7,2,6);
    // Eyes
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(13,11,2,2); ctx.fillRect(17,11,2,2);
    // Mouth
    ctx.fillStyle='#c0392b'; ctx.fillRect(14,14,4,1);
    // Neck
    ctx.fillStyle='#e8b891'; ctx.fillRect(13,17,6,2);
    // Shirt (blue)
    ctx.fillStyle='#2d6a9f'; ctx.fillRect(8,19,16,14);
    ctx.fillStyle='#3a7ab8'; ctx.fillRect(8,19,16,2); // collar highlight
    ctx.fillStyle='#1a4a7f'; ctx.fillRect(8,31,16,2); // shirt bottom shadow
    // Arms
    ctx.fillStyle='#f4c2a1'; ctx.fillRect(6,20,3,10); // left arm
    ctx.fillStyle='#f4c2a1'; ctx.fillRect(23,20,3,10); // right arm
    ctx.fillStyle='#2d6a9f'; ctx.fillRect(6,19,3,3); ctx.fillRect(23,19,3,3); // sleeves
    // Belt
    ctx.fillStyle='#5a3a1a'; ctx.fillRect(8,33,16,2);
    ctx.fillStyle='#8B6914'; ctx.fillRect(14,33,4,2); // buckle
    // Pants
    ctx.fillStyle='#3a3a4a'; ctx.fillRect(9,35,6,9); ctx.fillRect(17,35,6,9);
    ctx.fillStyle='#2a2a3a'; ctx.fillRect(9,42,6,2); ctx.fillRect(17,42,6,2); // pants shadow
    // Boots
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(8,44,7,4); ctx.fillRect(17,44,7,4);
  });

  // === Grass block (32x32) ===
  SPRITES.grass = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#5a8a3a'; ctx.fillRect(0,0,32,32);
    // Grass top layer
    ctx.fillStyle='#6daa4a'; ctx.fillRect(0,0,32,6);
    ctx.fillStyle='#7cba56'; ctx.fillRect(0,0,32,2);
    // Grass blades
    ctx.fillStyle='#8fcc66';
    for(let i=0;i<8;i++) ctx.fillRect(i*4+1, 5, 1, 3+Math.floor(Math.random()*2));
    // Dirt below grass
    ctx.fillStyle='#6a5a2a'; ctx.fillRect(0,8,32,24);
    // Dirt texture
    ctx.fillStyle='#5a4a1a'; 
    for(let i=0;i<12;i++) ctx.fillRect(Math.floor(Math.random()*30), 10+Math.floor(Math.random()*20), 2, 2);
    ctx.fillStyle='#7a6a3a';
    for(let i=0;i<8;i++) ctx.fillRect(Math.floor(Math.random()*30), 12+Math.floor(Math.random()*18), 1, 1);
    // Edge shading
    ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,28,32,4);
  });

  // === Dirt block (32x32) ===
  SPRITES.dirt = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#8B6914'; ctx.fillRect(0,0,32,32);
    ctx.fillStyle='#9B7924'; ctx.fillRect(2,2,28,28);
    // Texture spots
    ctx.fillStyle='#7B5914';
    for(let i=0;i<10;i++) ctx.fillRect(Math.floor(Math.random()*28)+2, Math.floor(Math.random()*28)+2, 3, 3);
    ctx.fillStyle='#AB8934';
    for(let i=0;i<8;i++) ctx.fillRect(Math.floor(Math.random()*28)+2, Math.floor(Math.random()*28)+2, 2, 2);
    // Edge darkening
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,28,32,4); ctx.fillRect(28,0,4,32);
  });

  // === Stone block (32x32) ===
  SPRITES.stone = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#7a7a7a'; ctx.fillRect(0,0,32,32);
    ctx.fillStyle='#8a8a8a'; ctx.fillRect(2,2,28,28);
    // Cracks and spots
    ctx.fillStyle='#6a6a6a';
    ctx.fillRect(6,4,4,3); ctx.fillRect(18,8,5,4); ctx.fillRect(10,16,6,3); ctx.fillRect(22,20,4,4);
    ctx.fillStyle='#9a9a9a';
    ctx.fillRect(8,5,2,1); ctx.fillRect(20,9,3,1); ctx.fillRect(12,17,4,1);
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(2,2,28,3);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,28,32,4);
  });

  // === Iron ore (32x32) ===
  SPRITES.iron_ore = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#7a7a7a'; ctx.fillRect(0,0,32,32);
    ctx.fillStyle='#8a8a8a'; ctx.fillRect(2,2,28,28);
    // Iron deposits
    ctx.fillStyle='#c89060'; ctx.fillRect(5,6,8,6); ctx.fillRect(18,14,10,8); ctx.fillRect(8,22,7,6);
    ctx.fillStyle='#d4a070'; ctx.fillRect(6,7,4,3); ctx.fillRect(19,15,6,4); ctx.fillRect(9,23,5,3);
    ctx.fillStyle='#b87850'; ctx.fillRect(8,10,2,1); ctx.fillRect(22,19,3,2); ctx.fillRect(11,26,2,1);
    // Stone texture
    ctx.fillStyle='#6a6a6a'; ctx.fillRect(14,4,3,2); ctx.fillRect(2,18,4,3);
  });

  // === Coal ore (32x32) ===
  SPRITES.coal_ore = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#7a7a7a'; ctx.fillRect(0,0,32,32);
    ctx.fillStyle='#8a8a8a'; ctx.fillRect(2,2,28,28);
    // Coal deposits
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(4,5,7,6); ctx.fillRect(16,8,9,7); ctx.fillRect(8,20,8,7); ctx.fillRect(22,22,6,5);
    ctx.fillStyle='#2a2a2a'; ctx.fillRect(5,6,4,3); ctx.fillRect(17,9,6,4); ctx.fillRect(9,21,5,4);
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(7,8,2,1); ctx.fillRect(19,11,2,1); ctx.fillRect(11,23,2,1);
  });

  // === Gold ore (32x32) ===
  SPRITES.gold_ore = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#7a7a7a'; ctx.fillRect(0,0,32,32);
    ctx.fillStyle='#8a8a8a'; ctx.fillRect(2,2,28,28);
    // Gold deposits
    ctx.fillStyle='#ffd700'; ctx.fillRect(5,5,8,7); ctx.fillRect(17,12,10,8); ctx.fillRect(6,20,7,7);
    ctx.fillStyle='#ffec80'; ctx.fillRect(6,6,5,4); ctx.fillRect(18,13,7,5); ctx.fillRect(7,21,5,4);
    ctx.fillStyle='#e6c200'; ctx.fillRect(8,9,2,1); ctx.fillRect(21,16,3,2); ctx.fillRect(9,24,2,1);
    // Sparkle
    ctx.fillStyle='#ffffff'; ctx.fillRect(9,7,1,1); ctx.fillRect(20,14,1,1); ctx.fillRect(9,22,1,1);
  });

  // === Water (32x32, animated via alpha in render) ===
  SPRITES.water = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#1e64b4'; ctx.fillRect(0,0,32,32);
    ctx.fillStyle='#2a7fd4'; ctx.fillRect(0,0,32,16);
    // Wave lines
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillRect(2,4,8,1); ctx.fillRect(14,6,10,1); ctx.fillRect(4,10,6,1);
    ctx.fillRect(18,14,8,1); ctx.fillRect(6,20,7,1); ctx.fillRect(16,24,9,1);
    // Radioactive green tint
    ctx.fillStyle='rgba(100,255,50,0.15)'; ctx.fillRect(0,0,32,32);
  });

  // === Tree (32x64) ===
  SPRITES.tree = makeSprite(32, 64, (ctx) => {
    // Trunk
    ctx.fillStyle='#5a3a1a'; ctx.fillRect(13,32,6,32);
    ctx.fillStyle='#6a4a2a'; ctx.fillRect(13,32,2,32); // highlight
    ctx.fillStyle='#3a2a0a'; ctx.fillRect(17,32,2,32); // shadow
    // Foliage layers
    ctx.fillStyle='#2d6a1e'; ctx.beginPath(); ctx.arc(16,24,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a8a2e'; ctx.beginPath(); ctx.arc(16,20,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4aa03e'; ctx.beginPath(); ctx.arc(16,16,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5ab04e'; ctx.beginPath(); ctx.arc(14,12,5,0,Math.PI*2); ctx.fill();
    // Foliage detail
    ctx.fillStyle='#1d5a0e'; ctx.fillRect(8,26,3,2); ctx.fillRect(22,24,3,2); ctx.fillRect(14,30,4,2);
  });

  // === Berry bush (32x32) ===
  SPRITES.berry_bush = makeSprite(32, 32, (ctx) => {
    ctx.fillStyle='#2e7d32'; ctx.beginPath(); ctx.arc(16,18,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a9a3e'; ctx.beginPath(); ctx.arc(16,16,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4aab4e'; ctx.beginPath(); ctx.arc(14,14,6,0,Math.PI*2); ctx.fill();
    // Berries
    ctx.fillStyle='#c2185b'; ctx.fillRect(10,14,3,3); ctx.fillRect(20,16,3,3); ctx.fillRect(14,22,3,3);
    ctx.fillStyle='#e91e63'; ctx.fillRect(11,15,1,1); ctx.fillRect(21,17,1,1); ctx.fillRect(15,23,1,1);
  });
}

// ==================== GAME ====================
const TILE = 32;
const WORLD_W = 150, WORLD_H = 80;
const SURFACE_Y = 38;
const ISLAND_START = 20, ISLAND_END = 130;
const GRAVITY = 800;
const JUMP_VEL = -400;
const MOVE_SPEED = 180;
const WATER_LEVEL = SURFACE_Y;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H, gameState = 'loading', gameTime = 0;
let cameraX = 0, cameraY = 0;
let moveDir = 0, jumpPressed = false;
let worldTiles = [], worldWalls = [];
let player = null;
let inventory = {}, hotbar = new Array(8).fill(null);
let selectedSlot = 0;
let clues = [], discoveredClues = [];
let particles = [];
let dayNight = 0;
let miningTarget = null, miningProgress = 0;
let mineHoldTime = 0;

const ITEM_NAMES = {
  dirt:'泥土', stone:'石头', wood:'木材', wood_plank:'木板', stick:'木棍',
  pickaxe:'镐子', torch:'火把', campfire:'篝火', bandage:'绷带',
  berry:'浆果', cooked_berry:'熟浆果', fresh_water:'淡水', purified_water:'纯净水',
  iron_ore:'铁矿', gold_ore:'金矿', coal:'煤矿', iron_ingot:'铁锭',
  iron_pickaxe:'铁镐', raft:'木筏', rad_suit:'防辐射服', water_filter:'净水器',
};
const USABLE = {
  berry:{hunger:15,msg:'浆果+15饥饿'}, cooked_berry:{hunger:35,msg:'熟浆果+35饥饿'},
  fresh_water:{thirst:20,msg:'淡水+20口渴'}, purified_water:{thirst:50,msg:'纯净水+50口渴'},
  bandage:{hp:25,msg:'绷带+25HP'},
};
const RECIPES = [
  {id:'wood_plank',name:'木板',icon:'🪵',req:{wood:1},give:{wood_plank:4}},
  {id:'stick',name:'木棍',icon:'🥢',req:{wood_plank:1},give:{stick:4}},
  {id:'torch',name:'火把',icon:'🔦',req:{stick:1,coal:1},give:{torch:4}},
  {id:'campfire',name:'篝火',icon:'🔥',req:{stick:4,wood_plank:2,stone:1},give:{campfire:1}},
  {id:'bandage',name:'绷带',icon:'🩹',req:{stick:1,wood_plank:1},give:{bandage:1}},
  {id:'pickaxe',name:'镐子',icon:'⛏️',req:{stick:2,wood_plank:2,stone:1},give:{pickaxe:1}},
  {id:'water_filter',name:'净水器',icon:'💧',req:{stone:3,wood_plank:2,stick:2},give:{water_filter:1}},
  {id:'raft',name:'木筏',icon:'🛶',req:{wood_plank:6,stick:4},give:{raft:1}},
  {id:'rad_suit',name:'防辐射服',icon:'🥼',req:{wood_plank:4,stone:2,stick:2},give:{rad_suit:1}},
  {id:'cooked_berry',name:'熟浆果',icon:'🍇',req:{berry:3,campfire:1},give:{cooked_berry:1}},
  {id:'purified_water',name:'纯净水',icon:'💎',req:{fresh_water:3,water_filter:1},give:{purified_water:1}},
  {id:'iron_ingot',name:'铁锭',icon:'🪨',req:{iron_ore:3,campfire:1,coal:1},give:{iron_ingot:1}},
  {id:'iron_pickaxe',name:'铁镐',icon:'⚒️',req:{iron_ingot:2,stick:2,wood_plank:1},give:{iron_pickaxe:1}},
];

const CLUE_DATA = [

// ==================== WORLD GEN ====================
function generateWorld() {
  worldTiles = [];
  worldWalls = [];
  for (let y = 0; y < WORLD_H; y++) {
    worldTiles[y] = [];
    worldWalls[y] = [];
    for (let x = 0; x < WORLD_W; x++) {
      worldTiles[y][x] = null;
      worldWalls[y][x] = null;
    }
  }

  // Generate island terrain with hills
  for (let x = 0; x < WORLD_W; x++) {
    let groundY = SURFACE_Y;
    // Smooth island shape: lower at edges
    let distFromCenter = Math.abs(x - (ISLAND_START+ISLAND_END)/2);
    let maxDist = (ISLAND_END-ISLAND_START)/2;
    if (distFromCenter > maxDist * 0.75) {
      let t = (distFromCenter - maxDist * 0.75) / (maxDist * 0.25);
      groundY += Math.floor(Math.min(1, t) * 10);
    }
    // Rolling hills
    groundY += Math.floor(Math.sin(x * 0.2) * 3 + Math.sin(x * 0.5) * 1.5);
    groundY = Math.max(SURFACE_Y - 4, Math.min(SURFACE_Y + 8, groundY));

    for (let y = groundY; y < WORLD_H; y++) {
      if (y < groundY + 3) worldTiles[y][x] = 'grass';
      else if (y < groundY + 12) worldTiles[y][x] = 'dirt';
      else worldTiles[y][x] = 'stone';
    }
  }

  // Oceans on both sides
  for (let x = 0; x < ISLAND_START; x++)
    for (let y = WATER_LEVEL; y < WORLD_H; y++) worldTiles[y][x] = 'water';
  for (let x = ISLAND_END; x < WORLD_W; x++)
    for (let y = WATER_LEVEL; y < WORLD_H; y++) worldTiles[y][x] = 'water';

  // Trees on surface
  for (let x = ISLAND_START + 2; x < ISLAND_END - 2; x++) {
    let gy = findGroundY(x);
    if (gy > 0 && gy < WORLD_H && Math.random() < 0.22 && !worldWalls[gy-1][x]) {
      worldWalls[gy-1][x] = 'tree';
    }
  }

  // Berry bushes
  for (let x = ISLAND_START + 3; x < ISLAND_END - 3; x++) {
    let gy = findGroundY(x);
    if (gy > 0 && gy < WORLD_H && Math.random() < 0.07 && !worldWalls[gy-1][x]) {
      worldWalls[gy-1][x] = 'berry_bush';
    }
  }

  // Underground ores
  for (let i = 0; i < 60; i++) {
    let x = ISLAND_START + Math.floor(Math.random() * (ISLAND_END - ISLAND_START));
    let y = SURFACE_Y + 8 + Math.floor(Math.random() * 35);
    if (y < WORLD_H && worldTiles[y][x] === 'stone') {
      let r = Math.random();
      if (r < 0.35) worldTiles[y][x] = 'iron_ore';
      else if (r < 0.55) worldTiles[y][x] = 'coal_ore';
      else if (r < 0.60) worldTiles[y][x] = 'gold_ore';
    }
  }

  // Caves
  for (let i = 0; i < 12; i++) {
    let cx = ISLAND_START + 10 + Math.floor(Math.random() * (ISLAND_END - ISLAND_START - 20));
    let cy = SURFACE_Y + 5 + Math.floor(Math.random() * 25);
    carveCave(cx, cy, 2 + Math.floor(Math.random() * 4));
  }

  // Place clues
  clues = CLUE_DATA.map(c => ({...c, discovered: false}));
  for (let clue of clues) {
    if (clue.y < WORLD_H && clue.x < WORLD_W) {
      if (worldTiles[clue.y][clue.x]) {
        worldWalls[clue.y][clue.x] = 'clue_' + clue.id;
      } else {
        worldWalls[clue.y][clue.x] = 'clue_' + clue.id;
      }
    }
  }
}

function findGroundY(x) {
  for (let y = 0; y < WORLD_H; y++) {
    if (worldTiles[y] && worldTiles[y][x] && worldTiles[y][x] !== 'water') return y;
  }
  return SURFACE_Y;
}

function carveCave(cx, cy, r) {
  for (let y = cy - r; y <= cy + r; y++) {
    for (let x = cx - r; x <= cx + r; x++) {
      if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) continue;
      let dx = (x - cx) / r, dy = (y - cy) / (r * 0.7);
      if (dx*dx + dy*dy < 1 && worldTiles[y][x] && worldTiles[y][x] !== 'water') {
        worldTiles[y][x] = null;
        worldWalls[y][x] = null;
      }
    }
  }
}

// ==================== PLAYER ====================
function createPlayer() {
  let sx = Math.floor((ISLAND_START + ISLAND_END) / 2);
  let sy = findGroundY(sx) - 5;
  return {
    x: sx * TILE + TILE/2, y: sy * TILE,
    vx: 0, vy: 0, w: 22, h: 44,
    hp: 100, maxHp: 100, hunger: 100, maxHunger: 100,
    thirst: 100, maxThirst: 100, radiation: 0, maxRadiation: 100,
    onGround: false, inWater: false,
    hasRadSuit: false, invincibleTimer: 0,
    animFrame: 0, animTimer: 0, facing: 1,
  };
}

// ==================== PHYSICS ====================
function isSolid(x, y) {
  let tx = Math.floor(x / TILE), ty = Math.floor(y / TILE);
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return false;
  let t = worldTiles[ty]?.[tx];
  if (t && t !== 'water') return true;
  let w = worldWalls[ty]?.[tx];
  if (w === 'tree') return false; // trees don't block
  if (w) return true;
  return false;
}

function getTile(tx, ty) {
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return null;
  return worldTiles[ty]?.[tx] || worldWalls[ty]?.[tx] || null;
}

// ==================== INIT ====================
function init() {
  resizeCanvas();
  generateWorld();
  player = createPlayer();
  inventory = {};
  hotbar = new Array(8).fill(null);
  selectedSlot = 0;
  discoveredClues = [];
  particles = [];
  dayNight = 0; gameTime = 0;
  miningTarget = null; miningProgress = 0;
  cameraX = player.x - W/2;
  cameraY = player.y - H/2;
}

function resizeCanvas() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  ctx.imageSmoothingEnabled = false;
}

      fill.style.width = progress + '%';

// ==================== GAME LOOP ====================
let lastTime = 0;
function gameLoop(timestamp) {
  if (gameState !== 'playing') { requestAnimationFrame(gameLoop); return; }
  if (!lastTime) lastTime = timestamp || 0;
  let dt = Math.min(((timestamp || 0) - lastTime) / 1000, 0.05);
  lastTime = timestamp || 0;
  if (dt <= 0) dt = 0.016;
  gameTime += dt;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ==================== UPDATE ====================
function update(dt) {
  // Horizontal movement
  let targetVx = moveDir * MOVE_SPEED;
  player.vx += (targetVx - player.vx) * Math.min(dt * 12, 1);
  if (moveDir !== 0) player.facing = moveDir;

  // Jump
  if (jumpPressed && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY * dt;
  player.vy = Math.min(player.vy, 700);

  // Water check
  let ptx = Math.floor(player.x / TILE);
  let pty = Math.floor((player.y - player.h/2) / TILE);
  player.inWater = (getTile(ptx, pty) === 'water');

  // Move X with collision
  let newX = player.x + player.vx * dt;
  let left = newX - player.w/2, right = newX + player.w/2;
  let top = player.y - player.h + 2, bottom = player.y - 2;
  if (player.vx < 0 && (isSolid(left, top) || isSolid(left, bottom))) {
    newX = (Math.floor(left / TILE) + 1) * TILE + player.w/2;
    player.vx = 0;
  }
  if (player.vx > 0 && (isSolid(right, top) || isSolid(right, bottom))) {
    newX = Math.floor(right / TILE) * TILE - player.w/2;
    player.vx = 0;
  }
  player.x = newX;

  // Move Y with collision
  let newY = player.y + player.vy * dt;
  left = player.x - player.w/2 + 2; right = player.x + player.w/2 - 2;
  top = newY - player.h; bottom = newY;
  player.onGround = false;
  if (player.vy < 0 && (isSolid(left, top) || isSolid(right, top))) {
    newY = (Math.floor(top / TILE) + 1) * TILE + player.h;
    player.vy = 0;
  }
  if (player.vy > 0 && (isSolid(left, bottom) || isSolid(right, bottom))) {
    newY = Math.floor(bottom / TILE) * TILE;
    player.vy = 0;
    player.onGround = true;
  }
  player.y = newY;

  // Water physics
  if (player.inWater) {
    player.vx *= 0.8;
    if (player.vy > 50) player.vy *= 0.6;
    player.onGround = false;
  }

  // Radiation
  if (player.inWater) {
    player.radiation = Math.min(player.maxRadiation, player.radiation + (player.hasRadSuit?2:8)*dt);
  } else {
    player.radiation = Math.max(0, player.radiation - 2*dt);
  }
  if (player.radiation >= player.maxRadiation) player.hp -= 5*dt;

  // Hunger & thirst
  player.hunger = Math.max(0, player.hunger - 1.2*dt);
  player.thirst = Math.max(0, player.thirst - 1.8*dt);
  if (player.hunger <= 0) player.hp -= 3*dt;
  if (player.thirst <= 0) player.hp -= 4*dt;
  if (player.invincibleTimer > 0) player.invincibleTimer -= dt;

  // Animation
  dayNight = (Math.sin(gameTime * 0.08) + 1) / 2;
  player.animTimer += dt;
  if (Math.abs(player.vx) > 20 && player.onGround) {
    if (player.animTimer > 0.12) { player.animTimer = 0; player.animFrame = (player.animFrame+1)%4; }
  } else { player.animFrame = 0; }

  // Clues discovery
  for (let clue of clues) {
    if (clue.discovered) continue;
    let dx = player.x - (clue.x * TILE + TILE/2);
    let dy = (player.y - player.h/2) - (clue.y * TILE + TILE/2);
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 2.5) {
      clue.discovered = true; discoveredClues.push(clue);
      showToast('🔍 ' + clue.text);
    }
  }

  // Mining
  if (miningTarget) {
    miningProgress += dt;
    let req = getMineTime(miningTarget.tile);
    if (miningProgress >= req) {
      completeMine(miningTarget);
      // Auto-continue if holding
      if (mineHoldTime > 0) {
        let next = getTargetTile();
        if (next && next.tx === miningTarget.tx && next.ty === miningTarget.ty) {
          miningTarget = next; miningProgress = 0;
        } else { miningTarget = null; miningProgress = 0; }
      } else {
        miningTarget = null; miningProgress = 0;
      }
    }
    updateMineUI();
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 300 * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Camera
  let tcx = player.x - W/2, tcy = player.y - H/2 - 50;
  cameraX += (tcx - cameraX) * 0.1;
  cameraY += (tcy - cameraY) * 0.1;
  cameraX = Math.max(0, Math.min(WORLD_W*TILE - W, cameraX));
  cameraY = Math.max(0, Math.min(WORLD_H*TILE - H, cameraY));

  if (player.hp <= 0) { showToast('你死了...'); init(); }
}

function getMineTime(tile) {
  let hasPick = getItemCount('pickaxe')>0 || getItemCount('iron_pickaxe')>0;
  let hasIronPick = getItemCount('iron_pickaxe')>0;
  if (!tile) return 999;
  if (tile.startsWith('clue_')) return 0.1;
  switch(tile) {
    case 'grass': case 'dirt': return 0.3;
    case 'stone': return hasIronPick?0.4:hasPick?0.7:1.5;
    case 'iron_ore': case 'coal_ore': return hasIronPick?0.5:hasPick?0.9:2.0;
    case 'gold_ore': return hasIronPick?0.7:hasPick?1.3:999;
    case 'tree': return 0.5;
    case 'berry_bush': return 0.2;
    default: return 1.0;
  }
}

function completeMine(target) {
  let tile = target.tile, tx = target.tx, ty = target.ty;
  let px = tx*TILE+TILE/2, py = ty*TILE+TILE/2;
  // Remove
  if (worldTiles[ty] && worldTiles[ty][tx] === tile) worldTiles[ty][tx] = null;
  else if (worldWalls[ty] && worldWalls[ty][tx] === tile) worldWalls[ty][tx] = null;
  // Drops
  switch(tile) {
    case 'grass': addItem('dirt',1); spawnP(px,py,5,100,80,30); break;
    case 'dirt': addItem('dirt',1); spawnP(px,py,5,139,105,20); break;
    case 'stone': addItem('stone',1+Math.floor(Math.random()*2)); spawnP(px,py,6,170,170,170); break;
    case 'iron_ore': addItem('iron_ore',1+Math.floor(Math.random()*2)); spawnP(px,py,6,200,144,100); break;
    case 'coal_ore': addItem('coal',1+Math.floor(Math.random()*2)); spawnP(px,py,6,50,50,50); break;
    case 'gold_ore': addItem('gold_ore',1+Math.floor(Math.random()*2)); spawnP(px,py,10,255,215,0); break;
    case 'tree': addItem('wood',2+Math.floor(Math.random()*4)); spawnP(px,py,8,90,60,30); break;
    case 'berry_bush': addItem('berry',2+Math.floor(Math.random()*3)); spawnP(px,py,5,233,30,99); break;
    default:
      if (tile && tile.startsWith('clue_')) {
        let cid = parseInt(tile.split('_')[1]);
        let c = clues.find(c=>c.id===cid);
        if (c && !c.discovered) { c.discovered=true; discoveredClues.push(c); showToast('🔍 '+c.text); }
        worldWalls[ty][tx] = null;
      }
      break;
  }
  updateHotbar();
}

function spawnP(x,y,n,r,g,b) {
  for (let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-0.5)*100,vy:-Math.random()*120-40,life:0.4+Math.random()*0.4,r,g,b});
}

// ==================== RENDER ====================
function render() {
  // Sky gradient
  let skyTop, skyBot;
  if (dayNight > 0.5) { skyTop='#4fc3f7'; skyBot='#b3e5fc'; }
  else { skyTop='#0a1628'; skyBot='#1a3a5c'; }
  let grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,skyTop); grad.addColorStop(1,skyBot);
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // Stars at night
  if (dayNight < 0.4) {
    ctx.fillStyle = '#fff';
    for (let i=0;i<60;i++) {
      let sx=((i*7919)%W), sy=((i*6271)%(H*0.4));
      let tw = Math.sin(gameTime*2+i)*0.5+0.5;
      ctx.globalAlpha = tw * (0.4-dayNight);
      ctx.fillRect(sx,sy,1,1);
    }
    ctx.globalAlpha = 1;
    // Moon
    ctx.fillStyle='#e0e0e0';
    ctx.beginPath(); ctx.arc(W-80, 60, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#c0c0c0';
    ctx.beginPath(); ctx.arc(W-75, 55, 16, 0, Math.PI*2); ctx.fill();
  } else if (dayNight > 0.7) {
    // Sun
    ctx.fillStyle='rgba(255,235,100,0.8)';
    ctx.beginPath(); ctx.arc(W-80, 50, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.3)';
    ctx.beginPath(); ctx.arc(W-80, 50, 28, 0, Math.PI*2); ctx.fill();
  }

  ctx.save();
  ctx.translate(-Math.floor(cameraX), -Math.floor(cameraY));

  let sx = Math.max(0, Math.floor(cameraX/TILE)-1);
  let sy = Math.max(0, Math.floor(cameraY/TILE)-1);
  let ex = Math.min(WORLD_W, Math.ceil((cameraX+W)/TILE)+1);
  let ey = Math.min(WORLD_H, Math.ceil((cameraY+H)/TILE)+1);

  // Draw tiles & walls
  for (let y = sy; y < ey; y++) {
    for (let x = sx; x < ex; x++) {
      let tile = worldTiles[y]?.[x];
      let wall = worldWalls[y]?.[x];
      let px = x*TILE, py = y*TILE;

      if (tile) {
        let sp = SPRITES[tile];
        if (sp) {
          ctx.drawImage(sp, px, py);
        } else if (tile === 'water') {
          let wave = Math.sin(gameTime*2+x*0.5+y*0.3)*0.15+0.85;
          ctx.globalAlpha = wave;
          ctx.drawImage(SPRITES.water, px, py);
          ctx.globalAlpha = 1;
        }
      } else if (y > SURFACE_Y) {
        // Underground background
        ctx.fillStyle = '#1a0e05';
        ctx.fillRect(px, py, TILE, TILE);
      }

      if (wall) {
        if (wall === 'tree') {
          ctx.drawImage(SPRITES.tree, px-0, py-TILE);
        } else if (wall === 'berry_bush') {
          ctx.drawImage(SPRITES.berry_bush, px, py);
        } else if (wall.startsWith('clue_')) {
          let pulse = Math.sin(gameTime*3)*0.3+0.7;
          ctx.fillStyle = `rgba(255,215,0,${pulse})`;
          ctx.beginPath(); ctx.arc(px+TILE/2, py+TILE/2, 8, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = `rgba(255,235,100,${pulse})`;
          ctx.beginPath(); ctx.arc(px+TILE/2, py+TILE/2, 5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
          ctx.fillText('?', px+TILE/2, py+TILE/2+4);
        }
      }
    }
  }

  // Particles
  for (let p of particles) {
    ctx.globalAlpha = Math.min(1, p.life/0.4);
    ctx.fillStyle = `rgb(${p.r},${p.g},${p.b})`;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // Player
  if (!(player.invincibleTimer > 0 && Math.floor(player.invincibleTimer*10)%2===0)) {
    let px = Math.floor(player.x - 16);
    let py = Math.floor(player.y - 44);
    if (player.facing < 0) {
      ctx.save();
      ctx.scale(-1, 1);
      ctx.drawImage(SPRITES.player, -px-32, py);
      ctx.restore();
    } else {
      ctx.drawImage(SPRITES.player, px, py);
    }
  }

  // Mining highlight
  if (miningTarget) {
    let mx = miningTarget.tx*TILE, my = miningTarget.ty*TILE;
    ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 2;
    ctx.strokeRect(mx+1, my+1, TILE-2, TILE-2);
    ctx.fillStyle = 'rgba(255,152,0,0.2)';
    ctx.fillRect(mx+1, my+1, TILE-2, TILE-2);
    // Crack effect
    let pct = miningProgress / getMineTime(miningTarget.tile);
    ctx.strokeStyle = `rgba(0,0,0,${pct*0.6})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mx+8, my+8); ctx.lineTo(mx+16, my+14); ctx.lineTo(mx+24, my+10);
    ctx.moveTo(mx+10, my+20); ctx.lineTo(mx+20, my+24);
    ctx.stroke();
  }

  ctx.restore();

  // Night overlay
  if (dayNight < 0.35) {
    ctx.fillStyle = `rgba(0,0,30,${0.45-dayNight})`;
    ctx.fillRect(0,0,W,H);
  }

  drawHUD();
}

function drawHUD() {
  let hx=10, hy=10, bw=130, bh=10, g=6;
  function bar(label,v,m,c,y,icon) {
    let pct = v/m;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(hx,y,bw+4,bh+4);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(hx+2,y+2,bw,bh);
    ctx.fillStyle=c; ctx.fillRect(hx+2,y+2,bw*pct,bh);
    if (pct<0.25 && Math.sin(gameTime*6)>0) {
      ctx.fillStyle='rgba(255,0,0,0.5)'; ctx.fillRect(hx+2,y+2,bw*pct,bh);
    }
    ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.textAlign='left';
    ctx.fillText(icon+label+':'+Math.floor(v), hx+4, y+bh-1);
  }
  bar('HP',player.hp,player.maxHp,'#e53935',hy,'❤');
  bar('饥',player.hunger,player.maxHunger,'#ff9800',hy+bh+g,'🍖');
  bar('渴',player.thirst,player.maxThirst,'#2196f3',hy+(bh+g)*2,'💧');
  bar('辐',player.radiation,player.maxRadiation,'#ffeb3b',hy+(bh+g)*3,'☢');

  if (player.inWater) {
    ctx.fillStyle='rgba(255,50,20,0.9)'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠ 辐射水中！', W/2, H-180);
  }

  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(W-80,10,70,20);
  ctx.fillStyle='#ffd700'; ctx.font='10px monospace'; ctx.textAlign='right';
  ctx.fillText('线索:'+discoveredClues.length+'/'+CLUE_DATA.length, W-15, 25);
}

function updateMineUI() {
  let el = document.getElementById('hint');
  if (!miningTarget) { el.style.display='none'; return; }
  let req = getMineTime(miningTarget.tile);
  let pct = Math.min(100, (miningProgress/req)*100);
  el.textContent = '挖掘中... ' + Math.floor(pct) + '%';
  el.style.display = 'block';
}

// ==================== INTERACTION ====================
function getTargetTile() {
  let cx = player.x + player.facing * TILE * 1.5;
  let cy = player.y - player.h/2;
  let tx = Math.floor(cx/TILE), ty = Math.floor(cy/TILE);
  if (tx<0||tx>=WORLD_W||ty<0||ty>=WORLD_H) return null;
  let tile = getTile(tx, ty);
  if (!tile) {
    // Try one tile down
    ty = Math.floor((player.y) / TILE);
    tile = getTile(tx, ty);
    if (!tile) return null;
  }
  return {tx, ty, tile};
}

function startMining() {
  let t = getTargetTile();
  if (!t) { showToast('面前没有方块'); return; }
  let dx = (t.tx*TILE+TILE/2)-player.x;
  let dy = (t.ty*TILE+TILE/2)-(player.y-player.h/2);
  if (Math.sqrt(dx*dx+dy*dy) > TILE*3) { showToast('太远了'); return; }
  miningTarget = t; miningProgress = 0; mineHoldTime = 0.1;
  updateMineUI();
}

function stopMining() {
  miningTarget = null; miningProgress = 0; mineHoldTime = 0;
  document.getElementById('hint').style.display = 'none';
}

function tryInteract() {
  let t = getTargetTile();
  if (!t) { showToast('面前没有东西'); return; }
  let dx = (t.tx*TILE+TILE/2)-player.x;
  let dy = (t.ty*TILE+TILE/2)-(player.y-player.h/2);
  if (Math.sqrt(dx*dx+dy*dy) > TILE*3) { showToast('太远了'); return; }
  if (t.tile === 'berry_bush') {
    addItem('berry', 2+Math.floor(Math.random()*3));
    spawnP(t.tx*TILE+TILE/2, t.ty*TILE+TILE/2, 5, 233, 30, 99);
    showToast('🫐 浆果+');
    if (Math.random()<0.3) worldWalls[t.ty][t.tx] = null;
    updateHotbar();
  } else if (t.tile === 'water') {
    showToast('海水有辐射！');
  } else if (t.tile && t.tile.startsWith('clue_')) {
    let cid = parseInt(t.tile.split('_')[1]);
    let c = clues.find(c=>c.id===cid);
    if (c && !c.discovered) { c.discovered=true; discoveredClues.push(c); showToast('🔍 '+c.text); }
    else showToast('已经读过了');
  } else {
    showToast('按住[挖]来挖掘');
  }
}

// ==================== INVENTORY ====================
function addItem(id, count) {
  if (!inventory[id]) inventory[id] = 0;
  inventory[id] += count;
  let idx = hotbar.findIndex(h => h && h.id === id);
  if (idx === -1) {
    let empty = hotbar.findIndex(h => !h);
    if (empty !== -1) hotbar[empty] = {id, count: inventory[id]};
  } else {
    hotbar[idx].count = inventory[id];
  }
  updateHotbar();
}
function getItemCount(id) { return inventory[id] || 0; }
function removeItem(id, count) {
  if (!inventory[id] || inventory[id] < count) return false;
  inventory[id] -= count;
  if (inventory[id] <= 0) delete inventory[id];
  for (let i = 0; i < hotbar.length; i++) {
    if (hotbar[i] && hotbar[i].id === id) {
      hotbar[i].count = inventory[id] || 0;
      if (hotbar[i].count <= 0) hotbar[i] = null;
    }
  }
  updateHotbar();
  return true;
}

const ICONS = {
  dirt:'🟫',stone:'🪨',wood:'🪵',wood_plank:'🟧',stick:'🥢',pickaxe:'⛏️',
  iron_pickaxe:'⚒️',torch:'🔦',campfire:'🔥',bandage:'🩹',berry:'🫐',
  cooked_berry:'🍇',fresh_water:'💧',purified_water:'💎',iron_ore:'🔩',
  gold_ore:'✨',coal:'⬛',iron_ingot:'🟤',raft:'🛶',rad_suit:'🥼',water_filter:'🔧',
};

function updateHotbar() {
  let html = '';
  for (let i = 0; i < 8; i++) {
    let item = hotbar[i];
    let sel = i === selectedSlot ? ' selected' : '';
    let icon = item ? (ICONS[item.id]||'📦') : '';
    let count = item ? item.count : '';
    html += `<div class="hotbarSlot${sel}" onclick="selectSlot(${i})"><span class="icon">${icon}</span><span class="count">${count}</span></div>`;
  }
  document.getElementById('hotbar').innerHTML = html;
}

function selectSlot(i) { selectedSlot = i; updateHotbar(); }

function tryUseItem(id) {
  let u = USABLE[id];
  if (!u) { showToast('不能直接用'); return; }
  if (!removeItem(id, 1)) return;
  if (u.hunger) player.hunger = Math.min(player.maxHunger, player.hunger+u.hunger);
  if (u.thirst) player.thirst = Math.min(player.maxThirst, player.thirst+u.thirst);
  if (u.hp) player.hp = Math.min(player.maxHp, player.hp+u.hp);
  showToast(u.msg);
  updateInventoryPanel();
}

function tryCraft(r) {
  for (let [k,v] of Object.entries(r.req)) {
    if (getItemCount(k) < v) {
      showToast('材料不足: ' + Object.entries(r.req).map(([k,v])=>ITEM_NAMES[k]+'x'+v+'(有'+getItemCount(k)+')').join(', '));
      return;
    }
  }
  for (let [k,v] of Object.entries(r.req)) removeItem(k, v);
  for (let [k,v] of Object.entries(r.give)) addItem(k, v);
  showToast('✅ '+r.name);
  updateCraftPanel(); updateInventoryPanel();
}

// ==================== UI ====================
function showToast(msg) {
  let t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(()=>{t.style.display='none';}, 2500);
}
function closePanel(id) { document.getElementById(id).style.display = 'none'; }

function updateInventoryPanel() {
  let items = Object.entries(inventory);
  let html = '';
  if (!items.length) html = '<p style="color:#666;text-align:center;">空</p>';
  else for (let [id, count] of items) {
    let useBtn = USABLE[id] ? `<button class="useBtn" onclick="tryUseItem('${id}')">用</button>` : '';
    html += `<div class="item"><span class="itemName">${ICONS[id]||'📦'} ${ITEM_NAMES[id]||id}</span><span>x${count}${useBtn}</span></div>`;
  }
  document.getElementById('inventoryList').innerHTML = html;
}

function updateCraftPanel() {
  let html = '';
  for (let r of RECIPES) {
    let can = true, req = [];
    for (let [k,v] of Object.entries(r.req)) {
      let h = getItemCount(k);
      if (h < v) can = false;
      req.push((ITEM_NAMES[k]||k)+':'+h+'/'+v);
    }
    html += `<div class="item"><div><span class="itemName">${r.icon} ${r.name}</span><br><small style="color:#888;">${req.join(', ')}</small></div><button class="craftBtn" ${can?'':'disabled'} onclick="tryCraft(RECIPES[${RECIPES.indexOf(r)}])">做</button></div>`;
  }
  document.getElementById('craftList').innerHTML = html;
}

// ==================== INPUT ====================
document.getElementById('btnInventory').addEventListener('click',()=>{updateInventoryPanel();document.getElementById('inventoryPanel').style.display='block';});
document.getElementById('btnCraft').addEventListener('click',()=>{updateCraftPanel();document.getElementById('craftPanel').style.display='block';});
document.getElementById('btnMenu').addEventListener('click',()=>{gameState='paused';document.getElementById('pausePanel').style.display='block';});

function setupBtn(id, onDown, onUp) {
  let b = document.getElementById(id);
  b.addEventListener('pointerdown', e=>{e.preventDefault();onDown();});
  b.addEventListener('pointerup', e=>{e.preventDefault();onUp();});
  b.addEventListener('pointerleave', ()=>{onUp();});
  b.addEventListener('pointercancel', ()=>{onUp();});
}
setupBtn('btnLeft', ()=>{moveDir=-1;}, ()=>{if(moveDir===-1)moveDir=0;});
setupBtn('btnRight', ()=>{moveDir=1;}, ()=>{if(moveDir===1)moveDir=0;});
setupBtn('btnJump', ()=>{jumpPressed=true;}, ()=>{jumpPressed=false;});
setupBtn('btnMine', ()=>{startMining();mineHoldTime=0.1;}, ()=>{mineHoldTime=0;stopMining();});
document.getElementById('btnInteract').addEventListener('click', e=>{e.preventDefault();tryInteract();});

document.addEventListener('keydown', e=>{
  switch(e.key) {
    case 'ArrowLeft':case'a':moveDir=-1;break;
    case 'ArrowRight':case'd':moveDir=1;break;
    case 'ArrowUp':case'w':case' ':jumpPressed=true;break;
    case 'e':tryInteract();break;
    case 'q':startMining();mineHoldTime=0.1;break;
    case 'i':case'f':updateInventoryPanel();document.getElementById('inventoryPanel').style.display='block';break;
    case 'c':updateCraftPanel();document.getElementById('craftPanel').style.display='block';break;
    case 'Escape':if(gameState==='playing'){gameState='paused';document.getElementById('pausePanel').style.display='block';}break;
    case '1':case'2':case'3':case'4':case'5':case'6':case'7':case'8':selectSlot(parseInt(e.key)-1);break;
  }
  e.preventDefault();
});
document.addEventListener('keyup', e=>{
  switch(e.key) {
    case 'ArrowLeft':case'a':if(moveDir===-1)moveDir=0;break;
    case 'ArrowRight':case'd':if(moveDir===1)moveDir=0;break;
    case 'ArrowUp':case'w':case' ':jumpPressed=false;break;
    case 'q':mineHoldTime=0;stopMining();break;
  }
});

// Tap on canvas to mine
canvas.addEventListener('pointerdown', e=>{
  if (gameState !== 'playing') return;
  e.preventDefault();
  let rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left + cameraX;
  let my = e.clientY - rect.top + cameraY;
  let tx = Math.floor(mx/TILE), ty = Math.floor(my/TILE);
  let tile = getTile(tx, ty);
  if (tile) {
    let dx = (tx*TILE+TILE/2)-player.x;
    let dy = (ty*TILE+TILE/2)-(player.y-player.h/2);
    if (Math.sqrt(dx*dx+dy*dy) < TILE*3.5) {
      miningTarget = {tx, ty, tile};
      miningProgress = 0;
      mineHoldTime = 0.1;
    }
  }
});
canvas.addEventListener('pointerup', ()=>{mineHoldTime=0;stopMining();});
canvas.addEventListener('pointerleave', ()=>{mineHoldTime=0;stopMining();});

window.addEventListener('resize', resizeCanvas);

// Init sprites and start
initSprites();
simulateLoading();
</script>
