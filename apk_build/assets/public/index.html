<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lost Blue Sea - 迷茫蓝海</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;width:100vw;height:100vh;height:100dvh;font-family:monospace;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:absolute;top:0;left:0;z-index:0;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#ui>*{pointer-events:auto;}

#loadingScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:#0a1628;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#loadingScreen .logo{font-size:clamp(32px,8vw,48px);font-weight:bold;color:#4fc3f7;text-shadow:0 0 20px #4fc3f7;margin-bottom:20px;}
#loadingScreen .subtitle{font-size:14px;color:#78909c;margin-bottom:30px;}
#loadingScreen .progressBar{width:240px;height:6px;background:#1a3a5c;border-radius:3px;overflow:hidden;}
#loadingScreen .progressFill{height:100%;background:#4fc3f7;width:0%;transition:width 0.3s;}
#loadingScreen .tip{color:#546e7a;font-size:12px;margin-top:15px;}

/* Controls - bottom */
#controls{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 10px;z-index:50;}
#dpad{display:flex;gap:4px;align-items:flex-end;}
.dpadBtn{width:50px;height:50px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6);font-size:20px;}
.dpadBtn:active{background:rgba(255,255,255,0.35);}
#btnJump{width:60px;height:60px;background:rgba(33,150,243,0.3);border:2px solid rgba(33,150,243,0.5);border-radius:50%;color:#fff;font-size:14px;font-weight:bold;margin-left:8px;display:flex;align-items:center;justify-content:center;}
#btnJump:active{background:rgba(33,150,243,0.6);}

#actionBtns{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.actionBtn{width:56px;height:56px;border-radius:50%;color:#fff;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;border:2px solid;}
#btnMine{background:rgba(255,152,0,0.35);border-color:rgba(255,152,0,0.6);}
#btnMine:active{background:rgba(255,152,0,0.6);}
#btnInteract{background:rgba(76,175,80,0.35);border-color:rgba(76,175,80,0.6);}
#btnInteract:active{background:rgba(76,175,80,0.6);}

/* Top menu */
#menuBtns{position:absolute;top:10px;right:10px;z-index:50;display:flex;gap:5px;}
.menuBtn{padding:7px 12px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;font-size:11px;}
.menuBtn:active{background:rgba(255,255,255,0.2);}

/* Hotbar */
#hotbar{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:50;background:rgba(0,0,0,0.7);padding:4px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);}
.hotbarSlot{width:42px;height:42px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;position:relative;}
.hotbarSlot.selected{border-color:#ffd700;background:rgba(255,215,0,0.2);}
.hotbarSlot .count{position:absolute;bottom:2px;right:3px;font-size:8px;color:#fff;}

/* Panels */
.panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.93);border:2px solid #4fc3f7;border-radius:12px;padding:16px;color:#fff;z-index:80;display:none;max-height:75vh;overflow-y:auto;min-width:280px;max-width:92vw;}
.panel h2{color:#4fc3f7;margin-bottom:10px;text-align:center;font-size:17px;}
.panel .closeBtn{position:absolute;top:8px;right:12px;color:#f44;font-size:20px;cursor:pointer;background:none;border:none;}
.panel .item{padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:13px;}
.panel .itemName{color:#81d4fa;}
.panel .craftBtn{background:#2e7d32;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;}
.panel .craftBtn:disabled{background:#444;color:#888;}
.panel .useBtn{background:#1565c0;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;white-space:nowrap;margin-left:4px;}

#toast{position:absolute;top:55px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#4fc3f7;padding:10px 20px;border-radius:8px;font-size:13px;z-index:90;display:none;text-align:center;max-width:90%;pointer-events:none;border:1px solid rgba(79,195,247,0.4);}

#mineProgress{position:absolute;display:none;pointer-events:none;z-index:45;}
#mineProgress .bar{width:32px;height:4px;background:rgba(0,0,0,0.6);border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,0.3);}
#mineProgress .fill{height:100%;background:#ff9800;width:0%;transition:width 0.1s;}
</style>
</head>

<script>
// ==================== CONSTANTS ====================
const TILE = 32;
const WORLD_W = 200, WORLD_H = 120;
const SURFACE_Y = 55; // ground level
const ISLAND_START = 30, ISLAND_END = 170;
const GRAVITY = 800;
const JUMP_VEL = -420;
const MOVE_SPEED = 200;
const WATER_LEVEL = SURFACE_Y - 2; // water level

// ==================== GAME STATE ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H, gameState = 'loading', gameTime = 0;
let cameraX = 0, cameraY = 0;
let moveDir = 0, jumpPressed = false, jumpBuffer = 0;
let worldTiles = [], worldWalls = [];
let player = null;
let inventory = {}, hotbar = new Array(8).fill(null);
let selectedSlot = 0;
let clues = [], discoveredClues = [];
let particles = [];
let dayNight = 0;
let miningTarget = null, miningProgress = 0;
let tutorialShown = false;

// ==================== ITEMS ====================
const ITEM_NAMES = {
  dirt:'泥土', stone:'石头', wood:'木材', wood_plank:'木板', stick:'木棍',
  shovel:'铲子', pickaxe:'镐子', torch:'火把', campfire:'篝火',
  bandage:'绷带', berry:'浆果', cooked_berry:'熟浆果', fresh_water:'淡水',
  purified_water:'纯净水', iron_ore:'铁矿', gold_ore:'金矿', coal:'煤矿',
  iron_ingot:'铁锭', iron_pickaxe:'铁镐', iron_shovel:'铁铲',
  raft:'木筏', rad_suit:'防辐射服', water_filter:'净水器',
};
const USABLE = {
  berry:{hunger:15,msg:'吃下浆果，饥饿+15'},
  cooked_berry:{hunger:35,msg:'吃下熟浆果，饥饿+35'},
  fresh_water:{thirst:20,msg:'喝下淡水，口渴+20'},
  purified_water:{thirst:50,msg:'喝下纯净水，口渴+50'},
  bandage:{hp:25,msg:'使用绷带，HP+25'},
};
const RECIPES = [
  {id:'wood_plank',name:'木板',icon:'🪵',req:{wood:1},give:{wood_plank:4}},
  {id:'stick',name:'木棍',icon:'🥢',req:{wood_plank:1},give:{stick:4}},
  {id:'torch',name:'火把',icon:'🔦',req:{stick:1,coal:1},give:{torch:4}},
  {id:'campfire',name:'篝火',icon:'🔥',req:{stick:4,wood_plank:2,stone:1},give:{campfire:1}},
  {id:'bandage',name:'绷带',icon:'🩹',req:{stick:1,wood_plank:1},give:{bandage:1}},
  {id:'shovel',name:'铲子',icon:'🔧',req:{stick:2,wood_plank:1},give:{shovel:1}},
  {id:'pickaxe',name:'镐子',icon:'⛏️',req:{stick:2,wood_plank:2,stone:1},give:{pickaxe:1}},
  {id:'water_filter',name:'净水器',icon:'💧',req:{stone:3,wood_plank:2,stick:2},give:{water_filter:1}},
  {id:'raft',name:'木筏',icon:'🛶',req:{wood_plank:6,stick:4},give:{raft:1}},
  {id:'rad_suit',name:'防辐射服',icon:'🥼',req:{wood_plank:4,stone:2,stick:2},give:{rad_suit:1}},
  {id:'cooked_berry',name:'熟浆果',icon:'🍇',req:{berry:3,campfire:1},give:{cooked_berry:1}},
  {id:'purified_water',name:'纯净水',icon:'💎',req:{fresh_water:3,water_filter:1},give:{purified_water:1}},
  {id:'iron_ingot',name:'铁锭',icon:'🪨',req:{iron_ore:3,campfire:1,coal:1},give:{iron_ingot:1}},
  {id:'iron_pickaxe',name:'铁镐',icon:'⚒️',req:{iron_ingot:2,stick:2,wood_plank:1},give:{iron_pickaxe:1}},
  {id:'iron_shovel',name:'铁铲',icon:'🪏',req:{iron_ingot:1,stick:2,wood_plank:1},give:{iron_shovel:1}},
];

const CLUE_DATA = [
  {id:0,x:55,y:52,text:'一张泛黄的纸条："核电站...泄漏...疏散..."'},
  {id:1,x:80,y:52,text:'破旧的收音机："这里是...最后的...广播..."'},
  {id:2,x:120,y:52,text:'金属牌："北极冰川监测站 - 2047"'},
  {id:3,x:65,y:40,text:'褪色的日记："海平面上升了70米..."'},
  {id:4,x:140,y:52,text:'墙上涂鸦："寻找方舟计划"'},
  {id:5,x:100,y:52,text:'骸骨旁的字条："不要喝海水..."'},
  {id:6,x:90,y:35,text:'地图碎片标记了地下避难所位置'},
  {id:7,x:50,y:30,text:'实验室报告："辐射变异样本已失控"'},
  {id:8,x:130,y:45,text:'一封未寄出的信："亲爱的..."'},
  {id:9,x:150,y:52,text:'GPS显示："最近陆地：3742公里"'},
  {id:10,x:70,y:48,text:'科学笔记："反向渗透...能净化海水..."'},
  {id:11,x:110,y:38,text:'破船日志："第87天，淡水耗尽..."'},
  {id:12,x:85,y:25,text:'地下室蓝图："矿井系统设计图"'},
  {id:13,x:135,y:30,text:'军方文件："Operation Ark - 最高机密"'},
  {id:14,x:60,y:52,text:'镜子上的字："记住你是谁"'},
];

// ==================== WORLD GENERATION ====================
function generateWorld() {
  worldTiles = [];
  worldWalls = [];
  for (let y = 0; y < WORLD_H; y++) {
    worldTiles[y] = [];
    worldWalls[y] = [];
    for (let x = 0; x < WORLD_W; x++) {
      worldTiles[y][x] = null;
      worldWalls[y][x] = null;
    }
  }

  // Generate terrain
  for (let x = 0; x < WORLD_W; x++) {
    // Island terrain: flat-ish in middle, slopes at edges
    let groundY = SURFACE_Y;
    let distFromCenter = Math.abs(x - WORLD_W/2);
    let centerDist = WORLD_W/2 - ISLAND_START;
    if (distFromCenter > centerDist * 0.7) {
      let edgeFactor = (distFromCenter - centerDist * 0.7) / (centerDist * 0.3);
      edgeFactor = Math.min(1, edgeFactor);
      groundY += Math.floor(edgeFactor * 12);
    }
    // Add some hills
    groundY += Math.floor(Math.sin(x * 0.15) * 2 + Math.sin(x * 0.3) * 1.5 + Math.sin(x * 0.08) * 3);
    groundY = Math.min(SURFACE_Y + 6, Math.max(SURFACE_Y - 2, groundY));

    // Fill terrain below surface
    for (let y = groundY; y < WORLD_H; y++) {
      if (y < groundY + 3) worldTiles[y][x] = 'grass';
      else if (y < groundY + 15) worldTiles[y][x] = 'dirt';
      else worldTiles[y][x] = 'stone';
    }

    // Grass on surface
    if (groundY > 0) worldTiles[groundY - 1][x] = null; // air above ground
  }

  // Water on sides (left and right ocean)
  for (let x = 0; x < ISLAND_START - 5; x++) {
    for (let y = WATER_LEVEL; y < WORLD_H; y++) {
      worldTiles[y][x] = 'water';
    }
  }
  for (let x = ISLAND_END + 5; x < WORLD_W; x++) {
    for (let y = WATER_LEVEL; y < WORLD_H; y++) {
      worldTiles[y][x] = 'water';
    }
  }

  // Place trees on surface
  for (let x = ISLAND_START + 3; x < ISLAND_END - 3; x++) {
    let groundY = findGroundY(x);
    if (groundY <= 0 || groundY >= WORLD_H) continue;
    if (Math.random() < 0.25 && worldTiles[groundY - 1] && !worldTiles[groundY - 1][x]) {
      worldWalls[groundY - 1][x] = 'tree';
    }
  }

  // Place berry bushes
  for (let x = ISLAND_START + 5; x < ISLAND_END - 5; x++) {
    let groundY = findGroundY(x);
    if (groundY <= 0 || groundY >= WORLD_H) continue;
    if (Math.random() < 0.08 && worldTiles[groundY - 1] && !worldTiles[groundY - 1][x]) {
      worldWalls[groundY - 1][x] = 'berry_bush';
    }
  }

  // Underground ores
  for (let i = 0; i < 80; i++) {
    let x = ISLAND_START + Math.floor(Math.random() * (ISLAND_END - ISLAND_START));
    let y = SURFACE_Y + 5 + Math.floor(Math.random() * 50);
    if (y < WORLD_H && worldTiles[y] && worldTiles[y][x] === 'stone') {
      let r = Math.random();
      if (r < 0.3) worldTiles[y][x] = 'iron_ore';
      else if (r < 0.5) worldTiles[y][x] = 'coal_ore';
      else if (r < 0.53) worldTiles[y][x] = 'gold_ore';
    }
  }

  // Caves
  for (let i = 0; i < 15; i++) {
    let cx = ISLAND_START + 15 + Math.floor(Math.random() * (ISLAND_END - ISLAND_START - 30));
    let cy = SURFACE_Y + 3 + Math.floor(Math.random() * 30);
    carveCave(cx, cy, 3 + Math.floor(Math.random() * 4));
  }

  // Clues
  clues = CLUE_DATA.map(c => ({...c, discovered: false}));
  for (let clue of clues) {
    if (clue.y < WORLD_H && worldTiles[clue.y] && worldTiles[clue.y][clue.x]) {
      worldWalls[clue.y][clue.x] = 'clue_' + clue.id;
    }
  }
}

function findGroundY(x) {
  for (let y = 0; y < WORLD_H; y++) {
    if (worldTiles[y] && worldTiles[y][x]) return y;
  }
  return -1;
}

function carveCave(cx, cy, radius) {
  for (let y = cy - radius; y <= cy + radius; y++) {
    for (let x = cx - radius; x <= cx + radius; x++) {
      if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) continue;
      let dx = (x - cx) / radius, dy = (y - cy) / (radius * 0.7);
      if (dx * dx + dy * dy < 1) {
        if (worldTiles[y] && worldTiles[y][x]) {
          worldTiles[y][x] = null;
          worldWalls[y][x] = null;
        }
      }
    }
  }
}

// ==================== PLAYER ====================
function createPlayer() {
  let spawnX = Math.floor(WORLD_W / 2);
  let spawnY = findGroundY(spawnX) - 4;
  return {
    x: spawnX * TILE + TILE/2, y: spawnY * TILE,
    vx: 0, vy: 0, w: 20, h: 38,
    hp: 100, maxHp: 100,
    hunger: 100, maxHunger: 100,
    thirst: 100, maxThirst: 100,
    radiation: 0, maxRadiation: 100,
    onGround: false, inWater: false,
    hasRaft: false, hasRadSuit: false,
    invincibleTimer: 0, animFrame: 0, animTimer: 0, facing: 1,
  };
}

// ==================== PHYSICS ====================
function isSolid(x, y) {
  let tx = Math.floor(x / TILE), ty = Math.floor(y / TILE);
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return false;
  if (worldTiles[ty] && worldTiles[ty][tx]) return true;
  if (worldWalls[ty] && worldWalls[ty][tx]) return true;
  return false;
}

function getTile(tx, ty) {
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return null;
  return worldTiles[ty]?.[tx] || worldWalls[ty]?.[tx] || null;
}

function getTileType(tx, ty) {
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return null;
  if (worldTiles[ty]?.[tx]) return 'tile';
  if (worldWalls[ty]?.[tx]) return 'wall';
  return null;
}

// ==================== INIT ====================
function init() {
  resizeCanvas();
  generateWorld();
  player = createPlayer();
  inventory = {};
  hotbar = new Array(8).fill(null);
  selectedSlot = 0;
  discoveredClues = [];
  particles = [];
  dayNight = 0; gameTime = 0;
  miningTarget = null; miningProgress = 0;
  cameraX = player.x - W/2;
  cameraY = player.y - H/2;
}

function resizeCanvas() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}

// ==================== LOADING ====================
function simulateLoading() {
  let progress = 0;
  const tips = ['冰川融化后，世界变成了一片汪洋...','核泄漏污染了每一滴海水...','你在一个孤岛上醒来...','活下去...'];
  const fill = document.getElementById('progressFill');
  const tip = document.getElementById('loadingTip');
  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if (progress >= 100) { progress = 100; clearInterval(interval); fill.style.width = '100%'; tip.textContent = '加载完成！';
      setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; showMainMenu(); }, 500); }
    else { fill.style.width = progress + '%'; tip.textContent = tips[Math.floor(progress/25)%tips.length]; }
  }, 200);
}

function showMainMenu() {
  gameState = 'menu';
  document.getElementById('mainMenuPanel').style.display = 'flex';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('menuBtns').style.display = 'none';
  document.getElementById('hotbar').style.display = 'none';
}

function startGame() {
  init(); gameState = 'playing';
  document.getElementById('mainMenuPanel').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('menuBtns').style.display = 'flex';
  document.getElementById('hotbar').style.display = 'flex';
  updateHotbar();
  showToast('横版生存！挖掘方块、收集资源、活下去！');
  gameLoop();
}

function resumeGame() { gameState = 'playing'; document.getElementById('pausePanel').style.display = 'none'; }

function saveGame() {
  localStorage.setItem('lostbluesea_save', JSON.stringify({
    player: {...player}, inventory: {...inventory}, hotbar: [...hotbar],
    discoveredClues: [...discoveredClues], gameTime, dayNight
  }));
  showToast('已保存！'); closePanel('pausePanel'); gameState = 'playing';
}

function loadGame() {
  const saved = localStorage.getItem('lostbluesea_save');
  if (!saved) { showToast('没有存档！'); return; }
  const data = JSON.parse(saved); init();
  Object.assign(player, data.player); inventory = data.inventory;
  hotbar = data.hotbar || new Array(8).fill(null);
  discoveredClues = data.discoveredClues; gameTime = data.gameTime; dayNight = data.dayNight;
  gameState = 'playing';
  document.getElementById('mainMenuPanel').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('menuBtns').style.display = 'flex';
  document.getElementById('hotbar').style.display = 'flex';
  updateHotbar();
  gameLoop();
}

// ==================== GAME LOOP ====================
let lastTime = 0;
function gameLoop(timestamp) {
  if (gameState !== 'playing') { requestAnimationFrame(gameLoop); return; }
  if (!lastTime) lastTime = timestamp;
  let dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  gameTime += dt;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ==================== UPDATE ====================
function update(dt) {
  // Movement
  let targetVx = moveDir * MOVE_SPEED;
  player.vx += (targetVx - player.vx) * Math.min(dt * 10, 1);
  if (moveDir !== 0) player.facing = moveDir;

  // Jump
  if (jumpPressed && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY * dt;
  player.vy = Math.min(player.vy, 800); // terminal velocity

  // Check water
  let ptx = Math.floor(player.x / TILE), pty = Math.floor((player.y + player.h/2) / TILE);
  player.inWater = (getTile(ptx, pty) === 'water');

  // Apply physics
  let newX = player.x + player.vx * dt;
  let newY = player.y + player.vy * dt;

  // Horizontal collision
  let left = newX - player.w/2, right = newX + player.w/2;
  let top = player.y - player.h, bottom = player.y;
  if (player.vx < 0 && (isSolid(left, top + 2) || isSolid(left, bottom - 2))) {
    newX = (Math.floor(left / TILE) + 1) * TILE + player.w/2;
    player.vx = 0;
  }
  if (player.vx > 0 && (isSolid(right, top + 2) || isSolid(right, bottom - 2))) {
    newX = Math.floor(right / TILE) * TILE - player.w/2;
    player.vx = 0;
  }

  // Vertical collision
  left = player.x - player.w/2; right = player.x + player.w/2;
  top = newY - player.h; bottom = newY;
  player.onGround = false;
  if (player.vy < 0 && (isSolid(left + 2, top) || isSolid(right - 2, top))) {
    newY = (Math.floor(top / TILE) + 1) * TILE + player.h;
    player.vy = 0;
  }
  if (player.vy > 0 && (isSolid(left + 2, bottom) || isSolid(right - 2, bottom))) {
    newY = Math.floor(bottom / TILE) * TILE;
    player.vy = 0;
    player.onGround = true;
  }

  player.x = newX; player.y = newY;

  // Water physics
  if (player.inWater) {
    player.vx *= 0.85;
    if (player.vy > 0) player.vy *= 0.7;
    player.onGround = false;
  }

  // Radiation
  if (player.inWater) {
    player.radiation = Math.min(player.maxRadiation, player.radiation + (player.hasRadSuit ? 2 : 8) * dt);
  } else {
    player.radiation = Math.max(0, player.radiation - 2 * dt);
  }
  if (player.radiation >= player.maxRadiation) player.hp -= 5 * dt;

  // Hunger & Thirst
  player.hunger = Math.max(0, player.hunger - 1.5 * dt);
  player.thirst = Math.max(0, player.thirst - 2 * dt);
  if (player.hunger <= 0) player.hp -= 3 * dt;
  if (player.thirst <= 0) player.hp -= 5 * dt;
  if (player.invincibleTimer > 0) player.invincibleTimer -= dt;

  dayNight = (Math.sin(gameTime * 0.1) + 1) / 2;
  player.animTimer += dt;
  if (Math.abs(player.vx) > 10 && player.onGround) {
    if (player.animTimer > 0.15) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  } else if (player.onGround) {
    player.animFrame = 0;
  }

  // Clues
  for (let clue of clues) {
    if (clue.discovered) continue;
    let dx = player.x - (clue.x * TILE + TILE/2);
    let dy = (player.y - player.h/2) - (clue.y * TILE + TILE/2);
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 2) {
      clue.discovered = true;
      discoveredClues.push(clue);
      showToast('🔍 ' + clue.text);
    }
  }

  // Mining progress
  if (miningTarget) {
    miningProgress += dt;
    let required = getMineTime(miningTarget.tile);
    if (miningProgress >= required) {
      completeMine(miningTarget);
      miningTarget = null;
      miningProgress = 0;
    }
    updateMineProgressUI();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Camera
  let tcx = player.x - W/2, tcy = player.y - H/2;
  cameraX += (tcx - cameraX) * 0.08;
  cameraY += (tcy - cameraY) * 0.08;
  cameraX = Math.max(0, Math.min(WORLD_W * TILE - W, cameraX));
  cameraY = Math.max(0, Math.min(WORLD_H * TILE - H, cameraY));

  if (player.hp <= 0) { showToast('你死了...重新开始'); init(); }
}

function getMineTime(tile) {
  let hasPick = getItemCount('pickaxe') > 0 || getItemCount('iron_pickaxe') > 0;
  let hasIronPick = getItemCount('iron_pickaxe') > 0;
  switch(tile) {
    case 'grass': case 'dirt': return 0.3;
    case 'stone': return hasIronPick ? 0.4 : hasPick ? 0.8 : 2.0;
    case 'iron_ore': case 'coal_ore': return hasIronPick ? 0.5 : hasPick ? 1.0 : 2.5;
    case 'gold_ore': return hasIronPick ? 0.8 : hasPick ? 1.5 : 999;
    case 'tree': return 0.5;
    case 'berry_bush': return 0.3;
    default: return 1.0;
  }
}

function completeMine(target) {
  let tile = target.tile;
  let tx = target.tx, ty = target.ty;
  let px = tx * TILE + TILE/2, py = ty * TILE + TILE/2;

  // Remove tile
  if (worldTiles[ty] && worldTiles[ty][tx] === tile) {
    worldTiles[ty][tx] = null;
  } else if (worldWalls[ty] && worldWalls[ty][tx] === tile) {
    worldWalls[ty][tx] = null;
  }

  // Give item
  switch(tile) {
    case 'grass': case 'dirt':
      addItem('dirt', 1); spawnParticles(px, py, 5, 139, 105, 20); break;
    case 'stone':
      addItem('stone', 1 + Math.floor(Math.random() * 2));
      spawnParticles(px, py, 6, 170, 170, 170); break;
    case 'iron_ore':
      addItem('iron_ore', 1 + Math.floor(Math.random() * 2));
      spawnParticles(px, py, 6, 196, 154, 108); break;
    case 'coal_ore':
      addItem('coal', 1 + Math.floor(Math.random() * 2));
      spawnParticles(px, py, 6, 60, 60, 60); break;
    case 'gold_ore':
      addItem('gold_ore', 1 + Math.floor(Math.random() * 2));
      spawnParticles(px, py, 10, 255, 215, 0); break;
    case 'tree':
      addItem('wood', 2 + Math.floor(Math.random() * 3));
      spawnParticles(px, py, 6, 139, 90, 43); break;
    case 'berry_bush':
      addItem('berry', 2 + Math.floor(Math.random() * 3));
      spawnParticles(px, py, 5, 233, 30, 99); break;
    default:
      if (tile && tile.startsWith('clue_')) break;
  }
  updateHotbar();
}

function spawnParticles(x, y, count, r, g, b) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 80,
      vy: -Math.random() * 100 - 30,
      life: 0.4 + Math.random() * 0.4,
      r, g, b
    });
  }
}

// ==================== RENDER ====================
function render() {
  let skyC = dayNight < 0.5 ? '#0a1628' : '#4fc3f7';
  ctx.fillStyle = skyC; ctx.fillRect(0, 0, W, H);

  ctx.save(); ctx.translate(-Math.floor(cameraX), -Math.floor(cameraY));

  let sx = Math.max(0, Math.floor(cameraX / TILE) - 1);
  let sy = Math.max(0, Math.floor(cameraY / TILE) - 1);
  let ex = Math.min(WORLD_W, Math.ceil((cameraX + W) / TILE) + 1);
  let ey = Math.min(WORLD_H, Math.ceil((cameraY + H) / TILE) + 1);

  // Draw tiles
  for (let y = sy; y < ey; y++) {
    for (let x = sx; x < ex; x++) {
      let tile = worldTiles[y]?.[x];
      let wall = worldWalls[y]?.[x];
      let px = x * TILE, py = y * TILE;

      if (tile) {
        switch(tile) {
          case 'grass': ctx.fillStyle='#5a9c4f';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#3d6b2e';ctx.fillRect(px,py,TILE,4);break;
          case 'dirt': ctx.fillStyle='#8B6914';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#9B7924';ctx.fillRect(px+2,py+2,TILE-4,TILE-4);break;
          case 'stone': ctx.fillStyle='#888';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#999';ctx.fillRect(px+2,py+2,TILE-4,TILE-4);ctx.fillStyle='#777';ctx.fillRect(px+6,py+6,4,4);break;
          case 'water': ctx.fillStyle=`rgba(30,100,180,${0.5+0.3*Math.sin(gameTime*3+x+y)})`;ctx.fillRect(px,py,TILE,TILE);break;
          case 'iron_ore': ctx.fillStyle='#888';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#c49a6c';ctx.fillRect(px+4,py+4,TILE-8,TILE-8);ctx.strokeStyle='#a07040';ctx.lineWidth=2;ctx.strokeRect(px+8,py+8,TILE-16,TILE-16);break;
          case 'coal_ore': ctx.fillStyle='#888';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#333';ctx.fillRect(px+4,py+4,TILE-8,TILE-8);ctx.fillStyle='#444';ctx.fillRect(px+6,py+6,TILE-12,TILE-12);break;
          case 'gold_ore': ctx.fillStyle='#888';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#ffd700';ctx.fillRect(px+4,py+4,TILE-8,TILE-8);ctx.fillStyle='#ffec80';ctx.fillRect(px+6,py+6,TILE-12,TILE-12);break;
        }
      } else {
        // Background caves
        if (y > SURFACE_Y) {
          ctx.fillStyle='#1a1208';ctx.fillRect(px,py,TILE,TILE);
        }
      }

      if (wall) {
        switch(wall) {
          case 'tree':
            ctx.fillStyle='#5a3a1a';ctx.fillRect(px+TILE/2-3,py+TILE/2,6,TILE/2);
            ctx.fillStyle='#2d5a1e';ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/3,TILE/2.5,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#3a7a2e';ctx.beginPath();ctx.arc(px+TILE/2-2,py+TILE/4,TILE/3.5,0,Math.PI*2);ctx.fill();
            break;
          case 'berry_bush':
            ctx.fillStyle='#2e7d32';ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2,TILE/3,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#e91e63';ctx.beginPath();ctx.arc(px+TILE/2-4,py+TILE/2-2,4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#e91e63';ctx.beginPath();ctx.arc(px+TILE/2+4,py+TILE/2-2,4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#f06292';ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2+3,8,0,Math.PI*2);ctx.fill();
            break;
          default:
            if (wall && wall.startsWith('clue_')) {
              let pulse = Math.sin(gameTime * 3) * 0.3 + 0.7;
              ctx.fillStyle = `rgba(255,215,0,${pulse})`;
              ctx.beginPath(); ctx.arc(px + TILE/2, py + TILE/2, 7, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
              ctx.fillText('?', px + TILE/2, py + TILE/2 + 4);
            }
            break;
        }
      }
    }
  }

  // Particles
  for (let p of particles) {
    let alpha = Math.min(1, p.life / 0.4);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }

  // Player
  if (!(player.invincibleTimer > 0 && Math.floor(player.invincibleTimer * 10) % 2 === 0)) {
    let px = player.x - player.w/2, py = player.y - player.h;
    // Body
    ctx.fillStyle = '#4a90d9'; ctx.fillRect(px + 6, py + 10, 8, 14);
    // Head
    ctx.fillStyle = '#ffcc80'; ctx.fillRect(px + 5, py, 10, 10);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 8 + (player.facing > 0 ? 2 : 0), py + 3, 2, 2);
    ctx.fillRect(px + 12 + (player.facing > 0 ? 2 : 0), py + 3, 2, 2);
    // Shirt
    ctx.fillStyle = '#e53935'; ctx.fillRect(px + 4, py + 10, 12, 4);
    // Arms
    let armOff = player.animFrame % 2 === 0 ? 0 : 2;
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(px + 6, py + 14 + armOff, 3, 8);
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(px + 12, py + 14 - armOff, 3, 8);
    // Legs
    let legOff = player.animFrame % 2 === 0 ? 1 : -1;
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(px + 7, py + 24, 3, 8 + legOff);
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(px + 11, py + 24, 3, 8 - legOff);
    // Rad suit
    if (player.hasRadSuit) {
      ctx.strokeStyle = 'rgba(255,200,50,0.5)'; ctx.lineWidth = 2;
      ctx.strokeRect(px + 4, py, 14, 38);
    }
  }

  // Mining cursor
  if (miningTarget) {
    let mx = miningTarget.tx * TILE, my = miningTarget.ty * TILE;
    ctx.strokeStyle = '#ff9800'; ctx.lineWidth = 2;
    ctx.strokeRect(mx + 1, my + 1, TILE - 2, TILE - 2);
    ctx.fillStyle = 'rgba(255,152,0,0.3)';
    ctx.fillRect(mx + 1, my + 1, TILE - 2, TILE - 2);
  }

  ctx.restore();

  // Night overlay
  if (dayNight < 0.3) {
    ctx.fillStyle = `rgba(0, 0, 20, ${0.5 - dayNight})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
}

function drawHUD() {
  // Status bars (top-left)
  let hx = 10, hy = 10, bw = 130, bh = 10, g = 6;
  function bar(label, v, m, c, y, icon) {
    let pct = v / m;
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(hx, y, bw + 4, bh + 4);
    ctx.fillStyle = '#222'; ctx.fillRect(hx + 2, y + 2, bw, bh);
    ctx.fillStyle = c; ctx.fillRect(hx + 2, y + 2, bw * pct, bh);
    if (pct < 0.25 && Math.sin(gameTime * 6) > 0) {
      ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(hx + 2, y + 2, bw * pct, bh);
    }
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'left';
    ctx.fillText((icon || '') + label + ': ' + Math.floor(v) + '/' + m, hx + 4, y + bh - 1);
  }
  bar('HP', player.hp, player.maxHp, '#e53935', hy, '❤️');
  bar('饥饿', player.hunger, player.maxHunger, '#ff9800', hy + bh + g, '🍖');
  bar('口渴', player.thirst, player.maxThirst, '#2196f3', hy + (bh + g) * 2, '💧');
  bar('辐射', player.radiation, player.maxRadiation, '#ffeb3b', hy + (bh + g) * 3, '☢️');

  // Water warning
  if (player.inWater) {
    ctx.fillStyle = 'rgba(255,50,20,0.8)'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('⚠ 辐射水中！', W / 2, H - 170);
  }

  // Clue count
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(W - 75, 10, 65, 20);
  ctx.fillStyle = '#ffd700'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
  ctx.fillText('线索:' + discoveredClues.length + '/' + CLUE_DATA.length, W - 15, 25);
}

function updateMineProgressUI() {
  let el = document.getElementById('mineProgress');
  if (!miningTarget) { el.style.display = 'none'; return; }
  let required = getMineTime(miningTarget.tile);
  let pct = Math.min(100, (miningProgress / required) * 100);
  document.getElementById('mineFill').style.width = pct + '%';
  el.style.display = 'block';
  let sx = miningTarget.tx * TILE - cameraX + TILE/2 - 16;
  let sy = miningTarget.ty * TILE - cameraY - 12;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
}

// ==================== INTERACTION ====================
function getTargetTile() {
  // Target the tile the player is facing/looking at
  let cx = player.x + player.facing * TILE * 1.2;
  let cy = player.y - player.h/2;
  let tx = Math.floor(cx / TILE), ty = Math.floor(cy / TILE);
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return null;
  let tile = getTile(tx, ty);
  if (!tile) return null;
  return { tx, ty, tile };
}

function startMining() {
  let target = getTargetTile();
  if (!target) { showToast('面前没有可挖掘的方块'); return; }
  // Check if reachable
  let dx = (target.tx * TILE + TILE/2) - player.x;
  let dy = (target.ty * TILE + TILE/2) - (player.y - player.h/2);
  if (Math.sqrt(dx*dx + dy*dy) > TILE * 2.5) { showToast('太远了，靠近一点'); return; }

  miningTarget = target;
  miningProgress = 0;
  document.getElementById('mineProgress').style.display = 'block';
  updateMineProgressUI();
}

function stopMining() {
  miningTarget = null;
  miningProgress = 0;
  document.getElementById('mineProgress').style.display = 'none';
}

function tryInteract() {
  let target = getTargetTile();
  if (!target) { showToast('面前没有可交互的东西'); return; }
  let dx = (target.tx * TILE + TILE/2) - player.x;
  let dy = (target.ty * TILE + TILE/2) - (player.y - player.h/2);
  if (Math.sqrt(dx*dx + dy*dy) > TILE * 2.5) { showToast('太远了'); return; }

  let tile = target.tile;
  if (tile === 'berry_bush') {
    addItem('berry', 2 + Math.floor(Math.random() * 3));
    spawnParticles(target.tx * TILE + TILE/2, target.ty * TILE + TILE/2, 5, 233, 30, 99);
    showToast('🫐 采集浆果！');
    updateHotbar();
  } else if (tile && tile.startsWith('clue_')) {
    let clueId = parseInt(tile.split('_')[1]);
    let clue = clues.find(c => c.id === clueId);
    if (clue && !clue.discovered) {
      clue.discovered = true;
      discoveredClues.push(clue);
      showToast('🔍 ' + clue.text);
      worldWalls[target.ty][target.tx] = null;
    }
  } else if (tile === 'water') {
    showToast('💧 海水有辐射，不能直接喝！');
  } else {
    showToast('开始挖掘这个方块吧！');
  }
}

// ==================== INVENTORY ====================
function addItem(id, count) {
  if (!inventory[id]) inventory[id] = 0;
  inventory[id] += count;
  // Auto-add to hotbar if empty slot
  let inHotbar = hotbar.findIndex(h => h && h.id === id);
  if (inHotbar === -1) {
    let emptySlot = hotbar.findIndex(h => !h);
    if (emptySlot !== -1) hotbar[emptySlot] = { id, count };
    else if (inHotbar === -1) {
      // Update existing slot if same item
    }
  } else {
    hotbar[inHotbar].count = inventory[id];
  }
  updateHotbar();
}

function getItemCount(id) { return inventory[id] || 0; }

function removeItem(id, count) {
  if (!inventory[id] || inventory[id] < count) return false;
  inventory[id] -= count;
  if (inventory[id] <= 0) delete inventory[id];
  // Update hotbar
  for (let i = 0; i < hotbar.length; i++) {
    if (hotbar[i] && hotbar[i].id === id) {
      hotbar[i].count = inventory[id] || 0;
      if (hotbar[i].count <= 0) hotbar[i] = null;
    }
  }
  updateHotbar();
  return true;
}

function updateHotbar() {
  let html = '';
  for (let i = 0; i < 8; i++) {
    let item = hotbar[i];
    let name = item ? (ITEM_NAMES[item.id] || item.id) : '';
    let count = item ? item.count : '';
    let sel = i === selectedSlot ? ' selected' : '';
    html += `<div class="hotbarSlot${sel}" onclick="selectSlot(${i})" id="slot${i}">
      <span style="font-size:16px;">${item ? getItemIcon(item.id) : ''}</span>
      <span class="count">${count}</span>
    </div>`;
  }
  document.getElementById('hotbar').innerHTML = html;
}

function getItemIcon(id) {
  let icons = {
    dirt: '🟫', stone: '🪨', wood: '🪵', wood_plank: '📋', stick: '🥢',
    pickaxe: '⛏️', iron_pickaxe: '⚒️', shovel: '🔧', iron_shovel: '🪏',
    torch: '🔦', campfire: '🔥', bandage: '🩹', berry: '🫐', cooked_berry: '🍇',
    fresh_water: '💧', purified_water: '💎', iron_ore: '🔩', gold_ore: '✨', coal: '⬛',
    iron_ingot: '🪨', raft: '🛶', rad_suit: '🥼', water_filter: '💧',
  };
  return icons[id] || '📦';
}

function selectSlot(i) {
  selectedSlot = i;
  updateHotbar();
}

function tryUseItem(itemId) {
  let usable = USABLE[itemId];
  if (!usable) { showToast('不能直接使用'); return; }
  if (!removeItem(itemId, 1)) { showToast('没有这个物品！'); return; }
  if (usable.hunger) player.hunger = Math.min(player.maxHunger, player.hunger + usable.hunger);
  if (usable.thirst) player.thirst = Math.min(player.maxThirst, player.thirst + usable.thirst);
  if (usable.hp) player.hp = Math.min(player.maxHp, player.hp + usable.hp);
  showToast(usable.msg);
  updateInventoryPanel();
}

// ==================== CRAFTING ====================
function tryCraft(recipe) {
  for (let [item, count] of Object.entries(recipe.req)) {
    if (getItemCount(item) < count) {
      let missing = Object.entries(recipe.req).map(([k, v]) => ITEM_NAMES[k] + 'x' + v + '(有' + getItemCount(k) + ')').join(', ');
      showToast('材料不足！需要: ' + missing);
      return;
    }
  }
  for (let [item, count] of Object.entries(recipe.req)) removeItem(item, count);
  for (let [item, count] of Object.entries(recipe.give)) addItem(item, count);
  showToast('✅ 制作成功: ' + recipe.name);
  updateCraftPanel();
  updateInventoryPanel();
}

// ==================== UI ====================
function showToast(msg) {
  let t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

function closePanel(id) { document.getElementById(id).style.display = 'none'; }

function updateInventoryPanel() {
  let list = document.getElementById('inventoryList');
  let items = Object.entries(inventory);
  let html = '';
  if (items.length === 0) html = '<p style="color:#666;text-align:center;">背包是空的</p>';
  else for (let [id, count] of items) {
    let name = ITEM_NAMES[id] || id;
    let useBtn = USABLE[id] ? `<button class="useBtn" onclick="tryUseItem('${id}')">使用</button>` : '';
    html += `<div class="item"><span class="itemName">${getItemIcon(id)} ${name}</span><span>x${count}${useBtn}</span></div>`;
  }
  list.innerHTML = html;
}

function updateCraftPanel() {
  let list = document.getElementById('craftList');
  let html = '';
  for (let recipe of RECIPES) {
    let can = true, reqText = [];
    for (let [item, count] of Object.entries(recipe.req)) {
      let has = getItemCount(item);
      if (has < count) can = false;
      reqText.push((ITEM_NAMES[item] || item) + ':' + has + '/' + count);
    }
    html += `<div class="item"><div><span class="itemName">${recipe.icon} ${recipe.name}</span><br><small style="color:#888;">${reqText.join(', ')}</small></div><button class="craftBtn" ${can ? '' : 'disabled'} onclick="tryCraft(RECIPES[${RECIPES.indexOf(recipe)}])">制作</button></div>`;
  }
  list.innerHTML = html;
}

// ==================== EVENT HANDLERS ====================
document.getElementById('btnInventory').addEventListener('click', () => {
  updateInventoryPanel();
  document.getElementById('inventoryPanel').style.display = 'block';
});
document.getElementById('btnCraft').addEventListener('click', () => {
  updateCraftPanel();
  document.getElementById('craftPanel').style.display = 'block';
});
document.getElementById('btnMenu').addEventListener('click', () => {
  gameState = 'paused';
  document.getElementById('pausePanel').style.display = 'block';
});

// D-pad
function setupDpad(id, dir) {
  let b = document.getElementById(id);
  b.addEventListener('pointerdown', (e) => { e.preventDefault(); moveDir = dir; });
  b.addEventListener('pointerup', (e) => { e.preventDefault(); if (moveDir === dir) moveDir = 0; });
  b.addEventListener('pointerleave', () => { if (moveDir === dir) moveDir = 0; });
}
setupDpad('btnLeft', -1);
setupDpad('btnRight', 1);

// Jump
let jumpBtn = document.getElementById('btnJump');
jumpBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); jumpPressed = true; });
jumpBtn.addEventListener('pointerup', (e) => { e.preventDefault(); jumpPressed = false; });
jumpBtn.addEventListener('pointerleave', () => { jumpPressed = false; });

// Mine button - hold to mine
let mineBtn = document.getElementById('btnMine');
mineBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); startMining(); });
mineBtn.addEventListener('pointerup', (e) => { e.preventDefault(); stopMining(); });
mineBtn.addEventListener('pointerleave', () => { stopMining(); });

// Interact button
document.getElementById('btnInteract').addEventListener('click', (e) => { e.preventDefault(); tryInteract(); });

// Keyboard
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  switch (e.key) {
    case 'ArrowLeft': case 'a': moveDir = -1; break;
    case 'ArrowRight': case 'd': moveDir = 1; break;
    case 'ArrowUp': case 'w': case ' ': jumpPressed = true; break;
    case 'e': tryInteract(); break;
    case 'q': startMining(); break;
    case 'i': case 'f': updateInventoryPanel(); document.getElementById('inventoryPanel').style.display = 'block'; break;
    case 'c': updateCraftPanel(); document.getElementById('craftPanel').style.display = 'block'; break;
    case 'Escape': if (gameState === 'playing') { gameState = 'paused'; document.getElementById('pausePanel').style.display = 'block'; } break;
    case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8':
      selectSlot(parseInt(e.key) - 1); break;
  }
  e.preventDefault();
});
document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
  switch (e.key) {
    case 'ArrowLeft': case 'a': if (moveDir === -1) moveDir = 0; break;
    case 'ArrowRight': case 'd': if (moveDir === 1) moveDir = 0; break;
    case 'ArrowUp': case 'w': case ' ': jumpPressed = false; break;
    case 'q': stopMining(); break;
  }
});

// Touch on canvas to mine
canvas.addEventListener('pointerdown', (e) => {
  if (gameState !== 'playing') return;
  let rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left + cameraX;
  let my = e.clientY - rect.top + cameraY;
  let tx = Math.floor(mx / TILE), ty = Math.floor(my / TILE);
  let tile = getTile(tx, ty);
  if (tile && !tile.startsWith('clue_')) {
    // Check distance
    let dx = (tx * TILE + TILE/2) - player.x;
    let dy = (ty * TILE + TILE/2) - (player.y - player.h/2);
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 3) {
      miningTarget = { tx, ty, tile };
      miningProgress = 0;
      updateMineProgressUI();
    }
  }
});
canvas.addEventListener('pointerup', () => { stopMining(); });
canvas.addEventListener('pointerleave', () => { stopMining(); });

window.addEventListener('resize', resizeCanvas);
simulateLoading();
</script>
