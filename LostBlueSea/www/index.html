<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lost Blue Sea - 迷茫蓝海</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; width:100vw; height:100vh; height:100dvh; }
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#gameContainer { position:relative; width:100%; height:100%; }
#ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
#ui > * { pointer-events:auto; }

/* Loading Screen */
#loadingScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:#0a1628; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
#loadingScreen .logo { font-size:48px; font-weight:bold; color:#4fc3f7; text-shadow:0 0 20px #4fc3f7; margin-bottom:20px; font-family:monospace; }
#loadingScreen .subtitle { font-size:14px; color:#78909c; margin-bottom:30px; font-family:monospace; }
#loadingScreen .progressBar { width:240px; height:6px; background:#1a3a5c; border-radius:3px; overflow:hidden; }
#loadingScreen .progressFill { height:100%; background:#4fc3f7; width:0%; transition:width 0.3s; }
#loadingScreen .tip { color:#546e7a; font-size:12px; margin-top:15px; font-family:monospace; }

/* D-Pad */
#dpad { position:absolute; bottom:20px; left:20px; width:160px; height:160px; z-index:50; }
.dpadBtn { position:absolute; width:50px; height:50px; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); border-radius:8px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.7); font-size:20px; }
.dpadBtn:active { background:rgba(255,255,255,0.35); }
#btnUp { top:0; left:55px; }
#btnDown { bottom:0; left:55px; }
#btnLeft { top:55px; left:0; }
#btnRight { top:55px; right:0; }

/* Action Buttons */
#actionBtns { position:absolute; bottom:20px; right:20px; z-index:50; display:flex; flex-direction:column; gap:10px; }
.actionBtn { width:60px; height:60px; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); border-radius:50%; color:rgba(255,255,255,0.8); font-size:12px; font-family:monospace; display:flex; align-items:center; justify-content:center; text-align:center; }
.actionBtn:active { background:rgba(255,255,255,0.35); }

/* Menu Buttons */
#menuBtns { position:absolute; top:10px; right:10px; z-index:50; display:flex; gap:8px; }
.menuBtn { padding:8px 14px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.3); border-radius:6px; color:#fff; font-size:12px; font-family:monospace; }
.menuBtn:active { background:rgba(255,255,255,0.2); }

/* Panels */
.panel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); border:2px solid #4fc3f7; border-radius:10px; padding:20px; color:#fff; z-index:80; display:none; max-height:80vh; overflow-y:auto; font-family:monospace; min-width:280px; }
.panel h2 { color:#4fc3f7; margin-bottom:15px; text-align:center; }
.panel .closeBtn { position:absolute; top:5px; right:10px; color:#f44; font-size:18px; cursor:pointer; background:none; border:none; }
.panel .item { padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; }
.panel .itemName { color:#81d4fa; }
.panel .craftBtn { background:#2e7d32; color:#fff; border:none; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; }
.panel .craftBtn:disabled { background:#555; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- Loading Screen -->
  <div id="loadingScreen">
    <div class="logo">LOST BLUE SEA</div>
    <div class="subtitle">迷茫蓝海 · Orgc 出品</div>
    <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
    <div class="tip" id="loadingTip">加载中...</div>
  </div>

  <!-- D-Pad -->
  <div id="dpad" style="display:none">
    <button class="dpadBtn" id="btnUp">▲</button>
    <button class="dpadBtn" id="btnDown">▼</button>
    <button class="dpadBtn" id="btnLeft">◀</button>
    <button class="dpadBtn" id="btnRight">▶</button>
  </div>

  <!-- Action Buttons -->
  <div id="actionBtns" style="display:none">
    <button class="actionBtn" id="btnGather">采集</button>
    <button class="actionBtn" id="btnMine">挖掘</button>
  </div>

  <!-- Menu Buttons -->
  <div id="menuBtns" style="display:none">
    <button class="menuBtn" id="btnInventory">背包</button>
    <button class="menuBtn" id="btnCraft">制作</button>
    <button class="menuBtn" id="btnMenu">菜单</button>
  </div>

  <!-- Inventory Panel -->
  <div class="panel" id="inventoryPanel">
    <button class="closeBtn" onclick="closePanel('inventoryPanel')">✕</button>
    <h2>背包</h2>
    <div id="inventoryList"></div>
  </div>

  <!-- Crafting Panel -->
  <div class="panel" id="craftPanel">
    <button class="closeBtn" onclick="closePanel('craftPanel')">✕</button>
    <h2>制作</h2>
    <div id="craftList"></div>
  </div>

  <!-- Pause Menu -->
  <div class="panel" id="pausePanel">
    <h2>暂停</h2>
    <button class="menuBtn" onclick="resumeGame()" style="display:block;width:100%;margin:10px 0;padding:10px;font-size:14px;">继续游戏</button>
    <button class="menuBtn" onclick="saveGame()" style="display:block;width:100%;margin:10px 0;padding:10px;font-size:14px;">保存游戏</button>
    <button class="menuBtn" onclick="location.reload()" style="display:block;width:100%;margin:10px 0;padding:10px;font-size:14px;">返回主菜单</button>
  </div>

  <!-- Main Menu -->
  <div class="panel" id="mainMenuPanel" style="display:flex;flex-direction:column;align-items:center;">
    <h2 style="font-size:24px;">LOST BLUE SEA</h2>
    <p style="color:#78909c;margin-bottom:20px;">迷茫蓝海 · Orgc</p>
    <button class="menuBtn" onclick="startGame()" style="display:block;width:200px;margin:8px 0;padding:12px;font-size:16px;">开始游戏</button>
    <button class="menuBtn" onclick="loadGame()" style="display:block;width:200px;margin:8px 0;padding:12px;font-size:16px;">继续游戏</button>
    <p style="color:#546e7a;font-size:10px;margin-top:20px;">v1.0 · Android 10+</p>
  </div>

  <!-- Story Clue Toast -->
  <div id="clueToast" style="position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(79,195,247,0.9);color:#000;padding:10px 20px;border-radius:8px;font-family:monospace;font-size:13px;z-index:90;display:none;text-align:center;max-width:90%;"></div>
</div>

<script>
// ==================== GAME ENGINE ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H, TILE = 32;
let gameState = 'loading';
let gameTime = 0;
let cameraX = 0, cameraY = 0;

// Input
const keys = {};
let moveDir = {x:0, y:0};

// Game Data
const WORLD_W = 80, WORLD_H = 60;
const GROUND_Y = 30;
const ISLAND_CENTER = 35;
const ISLAND_RADIUS = 18;

let worldTiles = [];
let player = null;
let inventory = {};
let clues = [];
let discoveredClues = [];
let entities = [];
let particles = [];
let dayNight = 0;

// Crafting Recipes
const RECIPES = [
  {id:'wood_plank', name:'木板', icon:'🪵', req:{wood:1}, give:{wood_plank:4}},
  {id:'stick', name:'木棍', icon:'🥢', req:{wood_plank:1}, give:{stick:4}},
  {id:'shovel', name:'铲子', icon:'🔧', req:{stick:2, wood_plank:1}, give:{shovel:1}},
  {id:'pickaxe', name:'镐子', icon:'⛏️', req:{stick:2, wood_plank:2, stone:1}, give:{pickaxe:1}},
  {id:'ladder', name:'梯子', icon:'🪜', req:{stick:4, wood_plank:2}, give:{ladder:1}},
  {id:'mine_entrance', name:'矿井入口', icon:'🕳️', req:{stick:4, wood_plank:4, shovel:1}, give:{mine_entrance:1}},
  {id:'raft', name:'木筏', icon:'🛶', req:{wood_plank:6, stick:4}, give:{raft:1}},
  {id:'rad_suit', name:'防辐射服', icon:'🥼', req:{wood_plank:4, stone:2, stick:2}, give:{rad_suit:1}},
  {id:'campfire', name:'篝火', icon:'🔥', req:{stick:4, wood_plank:2, stone:1}, give:{campfire:1}},
  {id:'water_filter', name:'净水器', icon:'💧', req:{stone:3, wood_plank:2, stick:2}, give:{water_filter:1}},
  {id:'bandage', name:'绷带', icon:'🩹', req:{stick:1, wood_plank:1}, give:{bandage:1}},
];

const CLUE_DATA = [
  {id:0, x:30, y:25, text:'一张泛黄的纸条："核电站...泄漏...疏散..."'},
  {id:1, x:40, y:28, text:'破旧的收音机传出杂音："这里是...最后的...广播..."'},
  {id:2, x:25, y:32, text:'一块金属牌："北极冰川监测站 - 2047"'},
  {id:3, x:45, y:35, text:'褪色的日记："海平面上升了70米，一切都没了..."'},
  {id:4, x:35, y:20, text:'墙上涂鸦："寻找方舟计划"'},
  {id:5, x:50, y:30, text:'一具骸骨旁的字条："不要喝海水..."'},
  {id:6, x:28, y:38, text:'地图碎片标记了地下避难所位置'},
  {id:7, x:42, y:22, text:'实验室报告："辐射变异样本已失控"'},
  {id:8, x:33, y:40, text:'一封未寄出的信："亲爱的，如果你看到这个..."'},
  {id:9, x:38, y:18, text:'GPS设备显示："最近陆地：3742公里"'},
  {id:10, x:22, y:27, text:'科学笔记："反向渗透...也许能净化海水..."'},
  {id:11, x:48, y:38, text:'破船上的日志："第87天，淡水耗尽..."'},
  {id:12, x:36, y:45, text:'地下室的蓝图："矿井系统设计图"'},
  {id:13, x:44, y:42, text:'军方文件："Operation Ark - 最高机密"'},
  {id:14, x:31, y:22, text:'你找到一面镜子，上面写着："记住你是谁"'},
];

// ==================== WORLD GENERATION ====================
function generateWorld() {
  worldTiles = [];
  for (let y = 0; y < WORLD_H; y++) {
    worldTiles[y] = [];
    for (let x = 0; x < WORLD_W; x++) {
      let dx = x - ISLAND_CENTER;
      let dy = y - GROUND_Y;
      let dist = Math.sqrt(dx*dx + dy*dy*0.5);
      
      if (dist < ISLAND_RADIUS) {
        if (y > GROUND_Y + 2) {
          worldTiles[y][x] = 'dirt';
        } else if (y > GROUND_Y) {
          worldTiles[y][x] = 'grass';
        } else {
          worldTiles[y][x] = 'air';
        }
      } else if (dist < ISLAND_RADIUS + 5) {
        worldTiles[y][x] = 'water';
      } else {
        worldTiles[y][x] = 'deep_water';
      }
    }
  }
  // Add some resources
  for (let i = 0; i < 15; i++) {
    let rx = ISLAND_CENTER + Math.floor(Math.random()*ISLAND_RADIUS*2) - ISLAND_RADIUS;
    let ry = GROUND_Y - Math.floor(Math.random()*3);
    if (rx >= 0 && rx < WORLD_W && ry >= 0 && ry < WORLD_H && worldTiles[ry][rx] === 'grass') {
      worldTiles[ry][rx] = 'tree';
    }
  }
  for (let i = 0; i < 10; i++) {
    let rx = ISLAND_CENTER + Math.floor(Math.random()*ISLAND_RADIUS*2) - ISLAND_RADIUS;
    let ry = GROUND_Y - Math.floor(Math.random()*3);
    if (rx >= 0 && rx < WORLD_W && ry >= 0 && ry < WORLD_H && worldTiles[ry][rx] === 'grass') {
      worldTiles[ry][rx] = 'stone_ore';
    }
  }
  // Cave entrance
  worldTiles[GROUND_Y][ISLAND_CENTER + 5] = 'cave';
  // Clues
  clues = CLUE_DATA.map(c => ({...c, discovered:false}));
}

// ==================== PLAYER ====================
function createPlayer() {
  return {
    x: ISLAND_CENTER * TILE + TILE/2,
    y: (GROUND_Y - 1) * TILE,
    vx: 0, vy: 0,
    w: 20, h: 28,
    speed: 3,
    hp: 100, maxHp: 100,
    hunger: 100, maxHunger: 100,
    thirst: 100, maxThirst: 100,
    radiation: 0, maxRadiation: 100,
    depth: 0,
    hasRaft: false,
    hasRadSuit: false,
    inWater: false,
    invincibleTimer: 0,
    animFrame: 0,
    animTimer: 0,
    facing: 0,
  };
}

// ==================== INIT ====================
function init() {
  resizeCanvas();
  generateWorld();
  player = createPlayer();
  inventory = {};
  discoveredClues = [];
  entities = [];
  particles = [];
  dayNight = 0;
  gameTime = 0;
  cameraX = player.x - W/2;
  cameraY = player.y - H/2;
}

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}

// ==================== LOADING ====================
function simulateLoading() {
  let progress = 0;
  const tips = [
    '冰川融化后，世界变成了一片汪洋...',
    '核泄漏污染了每一滴海水...',
    '你在一个孤岛上醒来，失去了所有记忆...',
    '寻找线索，揭开真相...',
    '活下去，是唯一的目标...',
  ];
  const fill = document.getElementById('progressFill');
  const tip = document.getElementById('loadingTip');
  
  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      fill.style.width = '100%';
      tip.textContent = '加载完成！';
      setTimeout(() => {
        document.getElementById('loadingScreen').style.display = 'none';
        showMainMenu();
      }, 500);
    } else {
      fill.style.width = progress + '%';
      tip.textContent = tips[Math.floor(progress / 20) % tips.length];
    }
  }, 200);
}

function showMainMenu() {
  gameState = 'menu';
  document.getElementById('mainMenuPanel').style.display = 'flex';
  document.getElementById('dpad').style.display = 'none';
  document.getElementById('actionBtns').style.display = 'none';
  document.getElementById('menuBtns').style.display = 'none';
}

// ==================== GAME START ====================
function startGame() {
  init();
  gameState = 'playing';
  document.getElementById('mainMenuPanel').style.display = 'none';
  document.getElementById('dpad').style.display = 'block';
  document.getElementById('actionBtns').style.display = 'flex';
  document.getElementById('menuBtns').style.display = 'flex';
  gameLoop();
}

function resumeGame() {
  gameState = 'playing';
  document.getElementById('pausePanel').style.display = 'none';
}

function saveGame() {
  const data = {
    player: {...player},
    inventory: {...inventory},
    discoveredClues: [...discoveredClues],
    gameTime,
    dayNight,
  };
  localStorage.setItem('lostbluesea_save', JSON.stringify(data));
  showToast('游戏已保存！');
  closePanel('pausePanel');
  gameState = 'playing';
}

function loadGame() {
  const saved = localStorage.getItem('lostbluesea_save');
  if (!saved) {
    showToast('没有存档！');
    return;
  }
  const data = JSON.parse(saved);
  init();
  Object.assign(player, data.player);
  inventory = data.inventory;
  discoveredClues = data.discoveredClues;
  gameTime = data.gameTime;
  dayNight = data.dayNight;
  gameState = 'playing';
  document.getElementById('mainMenuPanel').style.display = 'none';
  document.getElementById('dpad').style.display = 'block';
  document.getElementById('actionBtns').style.display = 'flex';
  document.getElementById('menuBtns').style.display = 'flex';
  gameLoop();
}

// ==================== GAME LOOP ====================
let lastTime = 0;
function gameLoop(timestamp) {
  if (gameState !== 'playing') {
    requestAnimationFrame(gameLoop);
    return;
  }
  if (!lastTime) lastTime = timestamp;
  let dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  
  gameTime += dt;
  update(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}

// ==================== UPDATE ====================
function update(dt) {
  // Player movement
  player.vx = moveDir.x * player.speed;
  player.vy = moveDir.y * player.speed;
  
  // Water slowdown
  let tx = Math.floor(player.x / TILE);
  let ty = Math.floor(player.y / TILE);
  if (tx >= 0 && tx < WORLD_W && ty >= 0 && ty < WORLD_H) {
    let tile = worldTiles[ty][tx];
    if (tile === 'water' || tile === 'deep_water') {
      player.vx *= 0.4;
      player.vy *= 0.4;
      player.inWater = true;
    } else {
      player.inWater = false;
    }
  }
  
  player.x += player.vx;
  player.y += player.vy;
  
  // Clamp to world
  player.x = Math.max(TILE/2, Math.min(WORLD_W * TILE - TILE/2, player.x));
  player.y = Math.max(0, Math.min(WORLD_H * TILE - TILE/2, player.y));
  
  // Radiation
  if (player.inWater) {
    let radRate = player.hasRadSuit ? 2 : 8;
    player.radiation = Math.min(player.maxRadiation, player.radiation + radRate * dt);
  } else {
    player.radiation = Math.max(0, player.radiation - 2 * dt);
  }
  
  if (player.radiation >= player.maxRadiation) {
    player.hp -= 5 * dt;
  }
  
  // Hunger & Thirst
  player.hunger = Math.max(0, player.hunger - 1.5 * dt);
  player.thirst = Math.max(0, player.thirst - 2 * dt);
  if (player.hunger <= 0) player.hp -= 3 * dt;
  if (player.thirst <= 0) player.hp -= 5 * dt;
  
  // Invincibility
  if (player.invincibleTimer > 0) player.invincibleTimer -= dt;
  
  // Day/Night
  dayNight = (Math.sin(gameTime * 0.1) + 1) / 2;
  
  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.2) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }
  
  // Check clues
  for (let clue of clues) {
    if (clue.discovered) continue;
    let dx = player.x - clue.x * TILE;
    let dy = player.y - clue.y * TILE;
    if (Math.sqrt(dx*dx + dy*dy) < TILE * 1.5) {
      clue.discovered = true;
      discoveredClues.push(clue);
      showToast('🔍 ' + clue.text);
    }
  }
  
  // Camera
  let targetCX = player.x - W/2;
  let targetCY = player.y - H/2;
  cameraX += (targetCX - cameraX) * 0.1;
  cameraY += (targetCY - cameraY) * 0.1;
  
  // Death
  if (player.hp <= 0) {
    showToast('你死了...重新开始');
    init();
  }
}

// ==================== RENDER ====================
function render() {
  // Sky gradient
  let skyTop = dayNight < 0.5 ? '#0a1628' : '#4fc3f7';
  let skyBot = dayNight < 0.5 ? '#1a3a5c' : '#81d4fa';
  let grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, skyTop);
  grad.addColorStop(1, skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Stars at night
  if (dayNight < 0.3) {
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 50; i++) {
      let sx = ((i * 7919 + 123) % W);
      let sy = ((i * 6271 + 456) % (H * 0.5));
      ctx.fillRect(sx, sy, 1, 1);
    }
  }
  
  ctx.save();
  ctx.translate(-cameraX, -cameraY);
  
  // Draw world
  let startX = Math.max(0, Math.floor(cameraX / TILE) - 1);
  let startY = Math.max(0, Math.floor(cameraY / TILE) - 1);
  let endX = Math.min(WORLD_W, Math.ceil((cameraX + W) / TILE) + 1);
  let endY = Math.min(WORLD_H, Math.ceil((cameraY + H) / TILE) + 1);
  
  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      let tile = worldTiles[y][x];
      let px = x * TILE, py = y * TILE;
      
      switch(tile) {
        case 'grass':
          ctx.fillStyle = '#4a7c3f';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#5a9c4f';
          ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
          break;
        case 'dirt':
          ctx.fillStyle = '#8B6914';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#9B7924';
          ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
          break;
        case 'water':
          ctx.fillStyle = `rgba(30, 100, 180, ${0.5 + 0.3 * Math.sin(gameTime*3 + x + y)})`;
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = 'rgba(255, 100, 50, 0.15)';
          ctx.fillRect(px, py, TILE, TILE);
          break;
        case 'deep_water':
          ctx.fillStyle = '#0a2a5a';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = 'rgba(255, 50, 20, 0.2)';
          ctx.fillRect(px, py, TILE, TILE);
          break;
        case 'tree':
          ctx.fillStyle = '#4a7c3f';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#5a3a1a';
          ctx.fillRect(px+TILE/2-4, py+TILE/4, 8, TILE*3/4);
          ctx.fillStyle = '#2d5a1e';
          ctx.beginPath();
          ctx.arc(px+TILE/2, py+TILE/4, TILE/2, 0, Math.PI*2);
          ctx.fill();
          break;
        case 'stone_ore':
          ctx.fillStyle = '#4a7c3f';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#888';
          ctx.fillRect(px+TILE/2-6, py+TILE/2-6, 12, 12);
          ctx.fillStyle = '#aaa';
          ctx.fillRect(px+TILE/2-4, py+TILE/2-4, 8, 8);
          break;
        case 'cave':
          ctx.fillStyle = '#4a7c3f';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.arc(px+TILE/2, py+TILE/2, TILE/3, 0, Math.PI*2);
          ctx.fill();
          break;
      }
    }
  }
  
  // Draw clues
  for (let clue of clues) {
    if (clue.discovered) continue;
    let cx = clue.x * TILE + TILE/2;
    let cy = clue.y * TILE + TILE/2;
    let pulse = Math.sin(gameTime * 3) * 0.2 + 0.8;
    ctx.fillStyle = `rgba(255, 215, 0, ${pulse})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('?', cx, cy+3);
  }
  
  // Draw player
  if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer * 10) % 2 === 0) {
    // Skip draw for invincibility blink
  } else {
    let px = player.x - player.w/2;
    let py = player.y - player.h;
    
    // Body
    ctx.fillStyle = '#4a90d9';
    ctx.fillRect(px + 6, py + 8, 8, 12);
    // Head
    ctx.fillStyle = '#ffcc80';
    ctx.fillRect(px + 5, py + 2, 10, 9);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 8, py + 5, 2, 2);
    ctx.fillRect(px + 12, py + 5, 2, 2);
    // Scarf (red - memory loss symbol)
    ctx.fillStyle = '#e53935';
    ctx.fillRect(px + 4, py + 8, 12, 3);
    ctx.fillRect(px + 14, py + 8, 3, 6);
    // Legs
    let legOff = player.animFrame % 2 === 0 ? 1 : -1;
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(px + 7, py + 20, 3, 6 + legOff);
    ctx.fillRect(px + 11, py + 20, 3, 6 - legOff);
    
    // Rad suit glow
    if (player.hasRadSuit) {
      ctx.strokeStyle = 'rgba(255, 200, 50, 0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 4, py, 14, 28);
    }
  }
  
  ctx.restore();
  
  // HUD
  drawHUD();
  
  // Night overlay
  if (dayNight < 0.3) {
    ctx.fillStyle = `rgba(0,0,20,${0.5 - dayNight})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawHUD() {
  let hudX = 10, hudY = 10, barW = 140, barH = 10, gap = 6;
  
  function drawBar(label, val, max, color, y) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(hudX, y, barW + 4, barH + 4);
    ctx.fillStyle = '#333';
    ctx.fillRect(hudX + 2, y + 2, barW, barH);
    ctx.fillStyle = color;
    ctx.fillRect(hudX + 2, y + 2, barW * (val / max), barH);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(label + ': ' + Math.floor(val) + '/' + max, hudX + 4, y + barH);
  }
  
  drawBar('HP', player.hp, player.maxHp, '#e53935', hudY);
  drawBar('饥饿', player.hunger, player.maxHunger, '#ff9800', hudY + barH + gap);
  drawBar('口渴', player.thirst, player.maxThirst, '#2196f3', hudY + (barH + gap) * 2);
  drawBar('辐射', player.radiation, player.maxRadiation, '#ffeb3b', hudY + (barH + gap) * 3);
  
  // Depth & time
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(hudX, hudY + (barH + gap) * 4 - 2, 100, 20);
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.fillText('深度: ' + player.depth + 'm', hudX + 4, hudY + (barH + gap) * 4 + 12);
  
  // Water warning
  if (player.inWater) {
    ctx.fillStyle = 'rgba(255,50,20,0.8)';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 辐射水中！', W/2, H - 200);
  }
  
  // Clues found
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(W - 80, 10, 70, 20);
  ctx.fillStyle = '#ffd700';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('线索: ' + discoveredClues.length + '/' + CLUE_DATA.length, W - 15, 25);
}

// ==================== INTERACTION ====================
function tryGather() {
  let tx = Math.floor(player.x / TILE);
  let ty = Math.floor(player.y / TILE);
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return;
  
  let tile = worldTiles[ty][tx];
  let gathered = null;
  
  if (tile === 'tree') {
    gathered = 'wood';
    addItem('wood', 1);
    showToast('获得木材 x1');
  } else if (tile === 'stone_ore') {
    gathered = 'stone';
    addItem('stone', 1);
    showToast('获得石头 x1');
  } else if (tile === 'grass') {
    if (Math.random() < 0.3) {
      addItem('wood', 1);
      showToast('获得木材 x1');
    }
  }
  
  if (gathered && Math.random() < 0.2) {
    worldTiles[ty][tx] = 'grass';
  }
}

function tryMine() {
  let tx = Math.floor(player.x / TILE);
  let ty = Math.floor(player.y / TILE);
  if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return;
  
  let tile = worldTiles[ty][tx];
  
  if (tile === 'stone_ore') {
    if (getItemCount('pickaxe') > 0) {
      addItem('stone', 3);
      worldTiles[ty][tx] = 'grass';
      showToast('⛏️ 挖到石头 x3');
    } else {
      showToast('需要镐子！');
    }
  } else if (tile === 'dirt') {
    if (getItemCount('shovel') > 0) {
      addItem('stone', 1);
      showToast('🔧 挖到石头 x1');
    } else {
      showToast('需要铲子！');
    }
  } else if (tile === 'cave') {
    if (getItemCount('mine_entrance') > 0) {
      player.depth -= 10;
      showToast('🕳️ 进入地下层！深度: ' + player.depth + 'm');
    } else {
      showToast('需要矿井入口！');
    }
  }
}

function addItem(id, count) {
  if (!inventory[id]) inventory[id] = 0;
  inventory[id] += count;
}

function getItemCount(id) {
  return inventory[id] || 0;
}

function removeItem(id, count) {
  if (!inventory[id] || inventory[id] < count) return false;
  inventory[id] -= count;
  if (inventory[id] <= 0) delete inventory[id];
  return true;
}

function tryCraft(recipe) {
  for (let [item, count] of Object.entries(recipe.req)) {
    if (getItemCount(item) < count) {
      showToast('材料不足！');
      return;
    }
  }
  for (let [item, count] of Object.entries(recipe.req)) {
    removeItem(item, count);
  }
  for (let [item, count] of Object.entries(recipe.give)) {
    addItem(item, count);
  }
  showToast('制作成功: ' + recipe.name);
  updateCraftPanel();
  updateInventoryPanel();
}

// ==================== UI ====================
function showToast(msg) {
  const toast = document.getElementById('clueToast');
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 2500);
}

function closePanel(id) {
  document.getElementById(id).style.display = 'none';
}

function updateInventoryPanel() {
  const list = document.getElementById('inventoryList');
  let html = '';
  let items = Object.entries(inventory);
  if (items.length === 0) {
    html = '<p style="color:#666;text-align:center;">背包是空的</p>';
  } else {
    for (let [id, count] of items) {
      let name = id.replace(/_/g, ' ');
      html += `<div class="item"><span class="itemName">${name}</span><span>x${count}</span></div>`;
    }
  }
  list.innerHTML = html;
}

function updateCraftPanel() {
  const list = document.getElementById('craftList');
  let html = '';
  for (let recipe of RECIPES) {
    let canCraft = true;
    let reqText = [];
    for (let [item, count] of Object.entries(recipe.req)) {
      let has = getItemCount(item);
      if (has < count) canCraft = false;
      reqText.push(`${item}:${has}/${count}`);
    }
    html += `<div class="item">
      <div><span class="itemName">${recipe.icon} ${recipe.name}</span><br><small style="color:#666;">${reqText.join(', ')}</small></div>
      <button class="craftBtn" ${canCraft?'':'disabled'} onclick="tryCraft(RECIPES[${RECIPES.indexOf(recipe)}])">制作</button>
    </div>`;
  }
  list.innerHTML = html;
}

// ==================== EVENT HANDLERS ====================
document.getElementById('btnInventory').addEventListener('click', () => {
  updateInventoryPanel();
  document.getElementById('inventoryPanel').style.display = 'block';
});
document.getElementById('btnCraft').addEventListener('click', () => {
  updateCraftPanel();
  document.getElementById('craftPanel').style.display = 'block';
});
document.getElementById('btnMenu').addEventListener('click', () => {
  gameState = 'paused';
  document.getElementById('pausePanel').style.display = 'block';
});
document.getElementById('btnGather').addEventListener('click', tryGather);
document.getElementById('btnMine').addEventListener('click', tryMine);

// D-Pad events
function setupDpadBtn(id, dx, dy) {
  const btn = document.getElementById(id);
  btn.addEventListener('pointerdown', (e) => { e.preventDefault(); moveDir.x = dx; moveDir.y = dy; });
  btn.addEventListener('pointerup', (e) => { e.preventDefault(); moveDir.x = 0; moveDir.y = 0; });
  btn.addEventListener('pointerleave', (e) => { moveDir.x = 0; moveDir.y = 0; });
}
setupDpadBtn('btnUp', 0, -1);
setupDpadBtn('btnDown', 0, 1);
setupDpadBtn('btnLeft', -1, 0);
setupDpadBtn('btnRight', 1, 0);

// Keyboard
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  switch(e.key) {
    case 'ArrowUp': case 'w': moveDir.y = -1; break;
    case 'ArrowDown': case 's': moveDir.y = 1; break;
    case 'ArrowLeft': case 'a': moveDir.x = -1; break;
    case 'ArrowRight': case 'd': moveDir.x = 1; break;
    case 'e': tryGather(); break;
    case 'q': tryMine(); break;
    case 'i': updateInventoryPanel(); document.getElementById('inventoryPanel').style.display = 'block'; break;
    case 'c': updateCraftPanel(); document.getElementById('craftPanel').style.display = 'block'; break;
    case 'Escape': 
      if (gameState === 'playing') {
        gameState = 'paused';
        document.getElementById('pausePanel').style.display = 'block';
      }
      break;
  }
});
document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
  switch(e.key) {
    case 'ArrowUp': case 'w': if (moveDir.y === -1) moveDir.y = 0; break;
    case 'ArrowDown': case 's': if (moveDir.y === 1) moveDir.y = 0; break;
    case 'ArrowLeft': case 'a': if (moveDir.x === -1) moveDir.x = 0; break;
    case 'ArrowRight': case 'd': if (moveDir.x === 1) moveDir.x = 0; break;
  }
});

// Resize
window.addEventListener('resize', resizeCanvas);

// ==================== START ====================
simulateLoading();
</script>
