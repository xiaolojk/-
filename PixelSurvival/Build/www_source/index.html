<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="screen-orientation" content="landscape">
<title>Lost Blue Sea - 迷茫蓝海</title>
<style>
:root{--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;font-family:monospace;position:fixed;top:0;left:0}
#gameContainer{position:relative;width:100%;height:100%}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;position:absolute;top:0;left:0}
#uiOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#uiOverlay>*{pointer-events:auto}
#loadingScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a1628,#0d2137);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loadingScreen .logo{font-size:clamp(28px,5vmin,48px);font-weight:bold;color:#4fc3f7;text-shadow:0 0 20px #4fc3f7;margin-bottom:2vmin}
#loadingScreen .subtitle{font-size:clamp(11px,1.8vmin,16px);color:#78909c;margin-bottom:3vmin}
#loadingScreen .progressBar{width:clamp(180px,30vmin,300px);height:clamp(4px,0.8vmin,8px);background:#1a3a5c;border-radius:1vmin;overflow:hidden}
#loadingScreen .progressFill{height:100%;background:#4fc3f7;width:0%;transition:width 0.3s}
#loadingScreen .tip{color:#546e7a;font-size:clamp(10px,1.5vmin,14px);margin-top:2vmin}
#dpad{position:absolute;bottom:calc(var(--safe-bottom) + 1vmin);left:calc(var(--safe-left) + 1vmin);width:clamp(120px,22vmin,220px);height:clamp(120px,22vmin,220px);z-index:50;pointer-events:auto}
.dpadBtn{position:absolute;width:32%;height:32%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:clamp(6px,1vmin,12px);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.6);font-size:clamp(14px,2.5vmin,28px);transition:background 0.1s}
.dpadBtn:active,.dpadBtn.pressed{background:rgba(255,255,255,0.3)}
#btnUp{top:0;left:34%}#btnDown{bottom:0;left:34%}#btnLeft{top:34%;left:0}#btnRight{top:34%;right:0}
#actionBtns{position:absolute;bottom:calc(var(--safe-bottom) + 1vmin);right:calc(var(--safe-right) + 1vmin);z-index:50;display:flex;flex-direction:column;gap:clamp(6px,1.2vmin,14px);pointer-events:auto}
.actionBtn{width:clamp(48px,9vmin,80px);height:clamp(48px,9vmin,80px);background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:50%;color:rgba(255,255,255,0.75);font-size:clamp(10px,1.5vmin,15px);font-family:monospace;display:flex;align-items:center;justify-content:center;text-align:center;transition:background 0.1s}
.actionBtn:active{background:rgba(255,255,255,0.3)}
#btnGather{background:rgba(76,175,80,0.25);border-color:rgba(76,175,80,0.5)}
#btnMine{background:rgba(255,152,0,0.25);border-color:rgba(255,152,0,0.5)}
#menuBtns{position:absolute;top:calc(var(--safe-top) + 1vmin);right:calc(var(--safe-right) + 1vmin);z-index:50;display:flex;gap:clamp(4px,0.8vmin,10px);pointer-events:auto}
.menuBtn{padding:clamp(6px,1vmin,10px) clamp(10px,1.5vmin,16px);background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.25);border-radius:clamp(5px,0.8vmin,8px);color:#fff;font-size:clamp(10px,1.4vmin,14px);font-family:monospace;white-space:nowrap}
.menuBtn:active{background:rgba(255,255,255,0.18)}
.panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.92);border:2px solid #4fc3f7;border-radius:clamp(8px,1.5vmin,14px);padding:clamp(12px,2vmin,24px);color:#fff;z-index:80;display:none;max-height:80vh;max-width:90vw;overflow-y:auto;font-family:monospace;width:clamp(260px,50vmin,420px);-webkit-overflow-scrolling:touch}
.panel h2{color:#4fc3f7;margin-bottom:clamp(10px,1.5vmin,18px);text-align:center;font-size:clamp(16px,2.2vmin,22px)}
.panel .closeBtn{position:absolute;top:clamp(4px,0.5vmin,8px);right:clamp(8px,1vmin,14px);color:#f44;font-size:clamp(16px,2.5vmin,22px);cursor:pointer;background:none;border:none;padding:0}
.panel .item{padding:clamp(6px,0.8vmin,10px);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;font-size:clamp(11px,1.5vmin,14px)}
.panel .itemName{color:#81d4fa}
.panel .craftBtn{background:#2e7d32;color:#fff;border:none;padding:clamp(4px,0.6vmin,8px) clamp(8px,1.2vmin,14px);border-radius:clamp(3px,0.5vmin,6px);cursor:pointer;font-size:clamp(10px,1.3vmin,13px);font-family:monospace;white-space:nowrap}
.panel .craftBtn:disabled{background:#444;opacity:0.5}
#clueToast{position:absolute;top:calc(var(--safe-top) + 50px);left:50%;transform:translateX(-50%);background:rgba(79,195,247,0.9);color:#000;padding:clamp(8px,1vmin,14px) clamp(14px,2vmin,24px);border-radius:clamp(6px,1vmin,10px);font-family:monospace;font-size:clamp(11px,1.4vmin,15px);z-index:90;display:none;text-align:center;max-width:90vw;pointer-events:none}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gameCanvas"></canvas>
<div id="uiOverlay">
<div id="loadingScreen"><div class="logo">LOST BLUE SEA</div><div class="subtitle">迷茫蓝海 · Orgc 出品</div><div class="progressBar"><div class="progressFill" id="progressFill"></div></div><div class="tip" id="loadingTip">加载中...</div></div>
<div id="dpad" style="display:none"><button class="dpadBtn" id="btnUp">▲</button><button class="dpadBtn" id="btnDown">▼</button><button class="dpadBtn" id="btnLeft">◀</button><button class="dpadBtn" id="btnRight">▶</button></div>
<div id="actionBtns" style="display:none"><button class="actionBtn" id="btnGather">采集</button><button class="actionBtn" id="btnMine">挖掘</button></div>
<div id="menuBtns" style="display:none"><button class="menuBtn" id="btnInventory">背包</button><button class="menuBtn" id="btnCraft">制作</button><button class="menuBtn" id="btnMenu">菜单</button></div>
<div class="panel" id="inventoryPanel"><button class="closeBtn" onclick="closePanel('inventoryPanel')">✕</button><h2>背包</h2><div id="inventoryList"></div></div>
<div class="panel" id="craftPanel"><button class="closeBtn" onclick="closePanel('craftPanel')">✕</button><h2>制作</h2><div id="craftList"></div></div>
<div class="panel" id="pausePanel"><h2>暂停</h2><button class="menuBtn" onclick="resumeGame()" style="display:block;width:100%;margin:clamp(6px,1vmin,12px) 0;padding:clamp(8px,1.2vmin,14px);font-size:clamp(13px,1.6vmin,16px);">继续游戏</button><button class="menuBtn" onclick="saveGame()" style="display:block;width:100%;margin:clamp(6px,1vmin,12px) 0;padding:clamp(8px,1.2vmin,14px);font-size:clamp(13px,1.6vmin,16px);">保存游戏</button><button class="menuBtn" onclick="location.reload()" style="display:block;width:100%;margin:clamp(6px,1vmin,12px) 0;padding:clamp(8px,1.2vmin,14px);font-size:clamp(13px,1.6vmin,16px);">返回主菜单</button></div>
<div class="panel" id="mainMenuPanel" style="display:flex;flex-direction:column;align-items:center;"><h2 style="font-size:clamp(20px,3vmin,28px);">LOST BLUE SEA</h2><p style="color:#78909c;margin-bottom:clamp(14px,2vmin,24px);font-size:clamp(11px,1.5vmin,15px);">迷茫蓝海 · Orgc</p><button class="menuBtn" onclick="startGame()" style="display:block;width:clamp(160px,30vmin,240px);margin:clamp(6px,1vmin,10px) 0;padding:clamp(10px,1.5vmin,16px);font-size:clamp(14px,1.8vmin,18px);">开始游戏</button><button class="menuBtn" onclick="loadGame()" style="display:block;width:clamp(160px,30vmin,240px);margin:clamp(6px,1vmin,10px) 0;padding:clamp(10px,1.5vmin,16px);font-size:clamp(14px,1.8vmin,18px);">继续游戏</button><p style="color:#546e7a;font-size:clamp(9px,1.1vmin,12px);margin-top:clamp(14px,2vmin,24px);">v1.1 · Android 10+</p></div>
<div id="clueToast"></div>
</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
let W,H,TILE,SCALE=1,gameState='loading',gameTime=0,cameraX=0,cameraY=0;
let moveDir={x:0,y:0};
const WORLD_W=80,WORLD_H=60,GROUND_Y=30,ISLAND_CENTER=35,ISLAND_RADIUS=18;
let worldTiles=[],player=null,inventory={},clues=[],discoveredClues=[],dayNight=0;

const RECIPES=[
{id:'wood_plank',name:'木板',icon:'🪵',req:{wood:1},give:{wood_plank:4}},
{id:'stick',name:'木棍',icon:'🥢',req:{wood_plank:1},give:{stick:4}},
{id:'shovel',name:'铲子',icon:'🔧',req:{stick:2,wood_plank:1},give:{shovel:1}},
{id:'pickaxe',name:'镐子',icon:'⛏️',req:{stick:2,wood_plank:2,stone:1},give:{pickaxe:1}},
{id:'ladder',name:'梯子',icon:'🪜',req:{stick:4,wood_plank:2},give:{ladder:1}},
{id:'mine_entrance',name:'矿井入口',icon:'🕳️',req:{stick:4,wood_plank:4,shovel:1},give:{mine_entrance:1}},
{id:'raft',name:'木筏',icon:'🛶',req:{wood_plank:6,stick:4},give:{raft:1}},
{id:'rad_suit',name:'防辐射服',icon:'🥼',req:{wood_plank:4,stone:2,stick:2},give:{rad_suit:1}},
{id:'campfire',name:'篝火',icon:'🔥',req:{stick:4,wood_plank:2,stone:1},give:{campfire:1}},
{id:'water_filter',name:'净水器',icon:'💧',req:{stone:3,wood_plank:2,stick:2},give:{water_filter:1}},
{id:'bandage',name:'绷带',icon:'🩹',req:{stick:1,wood_plank:1},give:{bandage:1}},
];
const CLUE_DATA=[
{id:0,x:30,y:25,text:'一张泛黄的纸条："核电站...泄漏...疏散..."'},
{id:1,x:40,y:28,text:'破旧的收音机传出杂音："这里是...最后的...广播..."'},
{id:2,x:25,y:32,text:'一块金属牌："北极冰川监测站 - 2047"'},
{id:3,x:45,y:35,text:'褪色的日记："海平面上升了70米，一切都没了..."'},
{id:4,x:35,y:20,text:'墙上涂鸦："寻找方舟计划"'},
{id:5,x:50,y:30,text:'一具骸骨旁的字条："不要喝海水..."'},
{id:6,x:28,y:38,text:'地图碎片标记了地下避难所位置'},
{id:7,x:42,y:22,text:'实验室报告："辐射变异样本已失控"'},
{id:8,x:33,y:40,text:'一封未寄出的信："亲爱的，如果你看到这个..."'},
{id:9,x:38,y:18,text:'GPS设备显示："最近陆地：3742公里"'},
{id:10,x:22,y:27,text:'科学笔记："反向渗透...也许能净化海水..."'},
{id:11,x:48,y:38,text:'破船上的日志："第87天，淡水耗尽..."'},
{id:12,x:36,y:45,text:'地下室的蓝图："矿井系统设计图"'},
{id:13,x:44,y:42,text:'军方文件："Operation Ark - 最高机密"'},
{id:14,x:31,y:22,text:'你找到一面镜子，上面写着："记住你是谁"'},
];

function generateWorld(){
worldTiles=[];
for(let y=0;y<WORLD_H;y++){worldTiles[y]=[];for(let x=0;x<WORLD_W;x++){let dx=x-ISLAND_CENTER,dy=y-GROUND_Y,dist=Math.sqrt(dx*dx+dy*dy*0.5);if(dist<ISLAND_RADIUS){if(y>GROUND_Y+2)worldTiles[y][x]='dirt';else if(y>GROUND_Y)worldTiles[y][x]='grass';else worldTiles[y][x]='air'}else if(dist<ISLAND_RADIUS+5)worldTiles[y][x]='water';else worldTiles[y][x]='deep_water'}}
for(let i=0;i<15;i++){let rx=ISLAND_CENTER+Math.floor(Math.random()*ISLAND_RADIUS*2)-ISLAND_RADIUS,ry=GROUND_Y-Math.floor(Math.random()*3);if(rx>=0&&rx<WORLD_W&&ry>=0&&ry<WORLD_H&&worldTiles[ry][rx]==='grass')worldTiles[ry][rx]='tree'}
for(let i=0;i<10;i++){let rx=ISLAND_CENTER+Math.floor(Math.random()*ISLAND_RADIUS*2)-ISLAND_RADIUS,ry=GROUND_Y-Math.floor(Math.random()*3);if(rx>=0&&rx<WORLD_W&&ry>=0&&ry<WORLD_H&&worldTiles[ry][rx]==='grass')worldTiles[ry][rx]='stone_ore'}
worldTiles[GROUND_Y][ISLAND_CENTER+5]='cave';clues=CLUE_DATA.map(c=>({...c,discovered:false}));
}
function createPlayer(){return{x:ISLAND_CENTER*TILE+TILE/2,y:(GROUND_Y-1)*TILE,vx:0,vy:0,w:20,h:28,speed:3,hp:100,maxHp:100,hunger:100,maxHunger:100,thirst:100,maxThirst:100,radiation:0,maxRadiation:100,depth:0,hasRaft:false,hasRadSuit:false,inWater:false,invincibleTimer:0,animFrame:0,animTimer:0,facing:0}}
function init(){resizeCanvas();generateWorld();player=createPlayer();inventory={};discoveredClues=[];dayNight=0;gameTime=0;cameraX=player.x-W/2;cameraY=player.y-H/2}
function resizeCanvas(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;TILE=Math.max(20,Math.min(48,Math.floor(H/18)));SCALE=TILE/32}
function simulateLoading(){let p=0;const tips=['冰川融化后，世界变成了一片汪洋...','核泄漏污染了每一滴海水...','你在一个孤岛上醒来，失去了所有记忆...','寻找线索，揭开真相...','活下去，是唯一的目标...'];const fill=document.getElementById('progressFill'),tip=document.getElementById('loadingTip');const iv=setInterval(()=>{p+=Math.random()*15;if(p>=100){p=100;clearInterval(iv);fill.style.width='100%';tip.textContent='加载完成！';setTimeout(()=>{document.getElementById('loadingScreen').style.display='none';showMainMenu()},500)}else{fill.style.width=p+'%';tip.textContent=tips[Math.floor(p/20)%tips.length]}},200)}
function showMainMenu(){gameState='menu';document.getElementById('mainMenuPanel').style.display='flex';document.getElementById('dpad').style.display='none';document.getElementById('actionBtns').style.display='none';document.getElementById('menuBtns').style.display='none'}
function startGame(){init();gameState='playing';document.getElementById('mainMenuPanel').style.display='none';document.getElementById('dpad').style.display='block';document.getElementById('actionBtns').style.display='flex';document.getElementById('menuBtns').style.display='flex';gameLoop()}
function resumeGame(){gameState='playing';document.getElementById('pausePanel').style.display='none'}
function saveGame(){localStorage.setItem('lostbluesea_save',JSON.stringify({player:{...player},inventory:{...inventory},discoveredClues:[...discoveredClues],gameTime,dayNight}));showToast('游戏已保存！');closePanel('pausePanel');gameState='playing'}
function loadGame(){const s=localStorage.getItem('lostbluesea_save');if(!s){showToast('没有存档！');return}const d=JSON.parse(s);init();Object.assign(player,d.player);inventory=d.inventory;discoveredClues=d.discoveredClues;gameTime=d.gameTime;dayNight=d.dayNight;gameState='playing';document.getElementById('mainMenuPanel').style.display='none';document.getElementById('dpad').style.display='block';document.getElementById('actionBtns').style.display='flex';document.getElementById('menuBtns').style.display='flex';gameLoop()}
let lastTime=0;
function gameLoop(ts){if(gameState!=='playing'){requestAnimationFrame(gameLoop);return}if(!lastTime)lastTime=ts;let dt=Math.min((ts-lastTime)/1000,0.1);lastTime=ts;gameTime+=dt;update(dt);render();requestAnimationFrame(gameLoop)}
function update(dt){player.vx=moveDir.x*player.speed;player.vy=moveDir.y*player.speed;let tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);if(tx>=0&&tx<WORLD_W&&ty>=0&&ty<WORLD_H){let t=worldTiles[ty][tx];if(t==='water'||t==='deep_water'){player.vx*=0.4;player.vy*=0.4;player.inWater=true}else player.inWater=false}player.x+=player.vx;player.y+=player.vy;player.x=Math.max(TILE/2,Math.min(WORLD_W*TILE-TILE/2,player.x));player.y=Math.max(0,Math.min(WORLD_H*TILE-TILE/2,player.y));if(player.inWater)player.radiation=Math.min(player.maxRadiation,player.radiation+(player.hasRadSuit?2:8)*dt);else player.radiation=Math.max(0,player.radiation-2*dt);if(player.radiation>=player.maxRadiation)player.hp-=5*dt;player.hunger=Math.max(0,player.hunger-1.5*dt);player.thirst=Math.max(0,player.thirst-2*dt);if(player.hunger<=0)player.hp-=3*dt;if(player.thirst<=0)player.hp-=5*dt;if(player.invincibleTimer>0)player.invincibleTimer-=dt;dayNight=(Math.sin(gameTime*0.1)+1)/2;player.animTimer+=dt;if(player.animTimer>0.2){player.animTimer=0;player.animFrame=(player.animFrame+1)%4}for(let c of clues){if(c.discovered)continue;let dx=player.x-c.x*TILE,dy=player.y-c.y*TILE;if(Math.sqrt(dx*dx+dy*dy)<TILE*1.5){c.discovered=true;discoveredClues.push(c);showToast('🔍 '+c.text)}}let tCX=player.x-W/2,tCY=player.y-H/2;cameraX+=(tCX-cameraX)*0.1;cameraY+=(tCY-cameraY)*0.1;if(player.hp<=0){showToast('你死了...重新开始');init()}}
function render(){let sT=dayNight<0.5?'#0a1628':'#4fc3f7',sB=dayNight<0.5?'#1a3a5c':'#81d4fa';let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,sT);g.addColorStop(1,sB);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);if(dayNight<0.3){ctx.fillStyle='#fff';for(let i=0;i<50;i++){let sx=((i*7919+123)%W),sy=((i*6271+456)%(H*0.5));ctx.fillRect(sx,sy,Math.max(1,TILE/32),Math.max(1,TILE/32))}}ctx.save();ctx.translate(-cameraX,-cameraY);let sX=Math.max(0,Math.floor(cameraX/TILE)-1),sY=Math.max(0,Math.floor(cameraY/TILE)-1),eX=Math.min(WORLD_W,Math.ceil((cameraX+W)/TILE)+1),eY=Math.min(WORLD_H,Math.ceil((cameraY+H)/TILE)+1);for(let y=sY;y<eY;y++){for(let x=sX;x<eX;x++){let t=worldTiles[y][x],px=x*TILE,py=y*TILE;switch(t){case'grass':ctx.fillStyle='#4a7c3f';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#5a9c4f';ctx.fillRect(px+2,py+2,TILE-4,TILE-4);break;case'dirt':ctx.fillStyle='#8B6914';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#9B7924';ctx.fillRect(px+2,py+2,TILE-4,TILE-4);break;case'water':ctx.fillStyle='rgba(30,100,180,'+(0.5+0.3*Math.sin(gameTime*3+x+y))+')';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='rgba(255,100,50,0.15)';ctx.fillRect(px,py,TILE,TILE);break;case'deep_water':ctx.fillStyle='#0a2a5a';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='rgba(255,50,20,0.2)';ctx.fillRect(px,py,TILE,TILE);break;case'tree':ctx.fillStyle='#4a7c3f';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#5a3a1a';ctx.fillRect(px+TILE/2-4,py+TILE/4,8,TILE*3/4);ctx.fillStyle='#2d5a1e';ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/4,TILE/2,0,Math.PI*2);ctx.fill();break;case'stone_ore':ctx.fillStyle='#4a7c3f';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#888';ctx.fillRect(px+TILE/2-6,py+TILE/2-6,12,12);ctx.fillStyle='#aaa';ctx.fillRect(px+TILE/2-4,py+TILE/2-4,8,8);break;case'cave':ctx.fillStyle='#4a7c3f';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(px+TILE/2,py+TILE/2,TILE/3,0,Math.PI*2);ctx.fill();break}}}for(let c of clues){if(c.discovered)continue;let cx=c.x*TILE+TILE/2,cy=c.y*TILE+TILE/2,pl=Math.sin(gameTime*3)*0.2+0.8;ctx.fillStyle='rgba(255,215,0,'+pl+')';ctx.beginPath();ctx.arc(cx,cy,Math.max(4,TILE/5),0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';let fs=Math.max(8,Math.floor(TILE/3));ctx.font=fs+'px monospace';ctx.textAlign='center';ctx.fillText('?',cx,cy+fs/3)}if(!(player.invincibleTimer>0&&Math.floor(player.invincibleTimer*10)%2===0)){let s=TILE/32,px=player.x-player.w*s/2,py=player.y-player.h*s;ctx.fillStyle='#4a90d9';ctx.fillRect(px+6*s,py+8*s,8*s,12*s);ctx.fillStyle='#ffcc80';ctx.fillRect(px+5*s,py+2*s,10*s,9*s);ctx.fillStyle='#000';ctx.fillRect(px+8*s,py+5*s,2*s,2*s);ctx.fillRect(px+12*s,py+5*s,2*s,2*s);ctx.fillStyle='#e53935';ctx.fillRect(px+4*s,py+8*s,12*s,3*s);ctx.fillRect(px+14*s,py+8*s,3*s,6*s);let lo=player.animFrame%2===0?1*s:-1*s;ctx.fillStyle='#3a3a3a';ctx.fillRect(px+7*s,py+20*s,3*s,6*s+lo);ctx.fillRect(px+11*s,py+20*s,3*s,6*s-lo);if(player.hasRadSuit){ctx.strokeStyle='rgba(255,200,50,0.5)';ctx.lineWidth=2*s;ctx.strokeRect(px+4*s,py,14*s,28*s)}}ctx.restore();drawHUD();if(dayNight<0.3){ctx.fillStyle='rgba(0,0,20,'+(0.5-dayNight)+')';ctx.fillRect(0,0,W,H)}}
function drawHUD(){let bW=Math.max(100,W*0.18),bH=Math.max(8,H*0.018),gap=Math.max(4,H*0.008),hX=Math.max(6,W*0.01),hY=Math.max(6,H*0.01),fs=Math.max(9,Math.floor(H*0.018));function dB(l,v,m,c,y){ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(hX,y,bW+4,bH+4);ctx.fillStyle='#333';ctx.fillRect(hX+2,y+2,bW,bH);ctx.fillStyle=c;ctx.fillRect(hX+2,y+2,bW*(v/m),bH);ctx.fillStyle='#fff';ctx.font=fs+'px monospace';ctx.textAlign='left';ctx.fillText(l+': '+Math.floor(v)+'/'+m,hX+4,y+bH+1)}dB('HP',player.hp,player.maxHp,'#e53935',hY);dB('饥饿',player.hunger,player.maxHunger,'#ff9800',hY+bH+gap);dB('口渴',player.thirst,player.maxThirst,'#2196f3',hY+(bH+gap)*2);dB('辐射',player.radiation,player.maxRadiation,'#ffeb3b',hY+(bH+gap)*3);let iY=hY+(bH+gap)*4+2;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(hX,iY-2,bW,bH+6);ctx.fillStyle='#fff';ctx.font=fs+'px monospace';ctx.fillText('深度: '+player.depth+'m',hX+4,iY+bH);if(player.inWater){ctx.fillStyle='rgba(255,50,20,0.8)';ctx.font=Math.max(11,Math.floor(H*0.02))+'px monospace';ctx.textAlign='center';ctx.fillText('⚠ 辐射水中！',W/2,H*0.72)}let cW=Math.max(70,W*0.12);ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W-cW-10,hY,cW,bH+6);ctx.fillStyle='#ffd700';ctx.font=fs+'px monospace';ctx.textAlign='right';ctx.fillText('线索: '+discoveredClues.length+'/'+CLUE_DATA.length,W-15,hY+bH+1)}
function tryGather(){let tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);if(tx<0||tx>=WORLD_W||ty<0||ty>=WORLD_H)return;let t=worldTiles[ty][tx],g=null;if(t==='tree'){g='wood';addItem('wood',1);showToast('获得木材 x1')}else if(t==='stone_ore'){g='stone';addItem('stone',1);showToast('获得石头 x1')}else if(t==='grass'&&Math.random()<0.3){addItem('wood',1);showToast('获得木材 x1')}if(g&&Math.random()<0.2)worldTiles[ty][tx]='grass'}
function tryMine(){let tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);if(tx<0||tx>=WORLD_W||ty<0||ty>=WORLD_H)return;let t=worldTiles[ty][tx];if(t==='stone_ore'){if(getItemCount('pickaxe')>0){addItem('stone',3);worldTiles[ty][tx]='grass';showToast('⛏️ 挖到石头 x3')}else showToast('需要镐子！')}else if(t==='dirt'){if(getItemCount('shovel')>0){addItem('stone',1);showToast('🔧 挖到石头 x1')}else showToast('需要铲子！')}else if(t==='cave'){if(getItemCount('mine_entrance')>0){player.depth-=10;showToast('🕳️ 进入地下层！深度: '+player.depth+'m')}else showToast('需要矿井入口！')}}
function addItem(id,c){if(!inventory[id])inventory[id]=0;inventory[id]+=c}
function getItemCount(id){return inventory[id]||0}
function removeItem(id,c){if(!inventory[id]||inventory[id]<c)return false;inventory[id]-=c;if(inventory[id]<=0)delete inventory[id];return true}
function tryCraft(r){for(let[i,c]of Object.entries(r.req)){if(getItemCount(i)<c){showToast('材料不足！');return}}for(let[i,c]of Object.entries(r.req))removeItem(i,c);for(let[i,c]of Object.entries(r.give))addItem(i,c);showToast('制作成功: '+r.name);updateCraftPanel();updateInventoryPanel()}
function showToast(m){const t=document.getElementById('clueToast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.display='none'},2500)}
function closePanel(id){document.getElementById(id).style.display='none'}
function updateInventoryPanel(){const l=document.getElementById('inventoryList');let it=Object.entries(inventory),h='';if(it.length===0)h='<p style="color:#666;text-align:center;">背包是空的</p>';else for(let[id,c]of it){h+='<div class="item"><span class="itemName">'+id.replace(/_/g,' ')+'</span><span>x'+c+'</span></div>'}l.innerHTML=h}
function updateCraftPanel(){const l=document.getElementById('craftList');let h='';for(let r of RECIPES){let ok=true,rt=[];for(let[i,c]of Object.entries(r.req)){let has=getItemCount(i);if(has<c)ok=false;rt.push(i+':'+has+'/'+c)}h+='<div class="item"><div><span class="itemName">'+r.icon+' '+r.name+'</span><br><small style="color:#666;">'+rt.join(', ')+'</small></div><button class="craftBtn" '+(ok?'':'disabled')+' onclick="tryCraft(RECIPES['+RECIPES.indexOf(r)+'])">制作</button></div>'}l.innerHTML=h}
document.getElementById('btnInventory').addEventListener('click',()=>{updateInventoryPanel();document.getElementById('inventoryPanel').style.display='block'});
document.getElementById('btnCraft').addEventListener('click',()=>{updateCraftPanel();document.getElementById('craftPanel').style.display='block'});
document.getElementById('btnMenu').addEventListener('click',()=>{gameState='paused';document.getElementById('pausePanel').style.display='block'});
document.getElementById('btnGather').addEventListener('click',(e)=>{e.preventDefault();tryGather()});
document.getElementById('btnMine').addEventListener('click',(e)=>{e.preventDefault();tryMine()});
function setupDpadBtn(id,dx,dy){const b=document.getElementById(id);const a=(e)=>{e.preventDefault();moveDir.x=dx;moveDir.y=dy;b.classList.add('pressed')};const d=(e)=>{e.preventDefault();moveDir.x=0;moveDir.y=0;b.classList.remove('pressed')};b.addEventListener('pointerdown',a);b.addEventListener('touchstart',a,{passive:false});b.addEventListener('pointerup',d);b.addEventListener('touchend',d);b.addEventListener('pointerleave',d);b.addEventListener('pointercancel',d)}
setupDpadBtn('btnUp',0,-1);setupDpadBtn('btnDown',0,1);setupDpadBtn('btnLeft',-1,0);setupDpadBtn('btnRight',1,0);
document.addEventListener('keydown',(e)=>{switch(e.key){case'ArrowUp':case'w':moveDir.y=-1;break;case'ArrowDown':case's':moveDir.y=1;break;case'ArrowLeft':case'a':moveDir.x=-1;break;case'ArrowRight':case'd':moveDir.x=1;break;case'e':tryGather();break;case'q':tryMine();break;case'i':updateInventoryPanel();document.getElementById('inventoryPanel').style.display='block';break;case'c':updateCraftPanel();document.getElementById('craftPanel').style.display='block';break;case'Escape':if(gameState==='playing'){gameState='paused';document.getElementById('pausePanel').style.display='block'}break}});
document.addEventListener('keyup',(e)=>{switch(e.key){case'ArrowUp':case'w':if(moveDir.y===-1)moveDir.y=0;break;case'ArrowDown':case's':if(moveDir.y===1)moveDir.y=0;break;case'ArrowLeft':case'a':if(moveDir.x===-1)moveDir.x=0;break;case'ArrowRight':case'd':if(moveDir.x===1)moveDir.x=0;break}});
document.addEventListener('gesturestart',(e)=>e.preventDefault());document.addEventListener('gesturechange',(e)=>e.preventDefault());document.addEventListener('gestureend',(e)=>e.preventDefault());document.addEventListener('dblclick',(e)=>e.preventDefault());
window.addEventListener('resize',()=>{resizeCanvas();cameraX=player.x-W/2;cameraY=player.y-H/2});
function forceLandscape(){if(window.innerHeight>window.innerWidth&&gameState==='playing')showToast('请横屏游玩')}
window.addEventListener('resize',forceLandscape);window.addEventListener('orientationchange',()=>setTimeout(forceLandscape,300));
simulateLoading();
</script>
